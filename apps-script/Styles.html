<style>
  /* 
 * Tradición AI Engine — "La Armadura Final" (v10.1 - Date: 2026-05-30)
 * CSS Stylesheet & Glassmorphic Design System
 */

  /* Theme Variables Definition */
  :root {
    --font-family-title: 'Outfit', sans-serif;
    --font-family-body: 'Inter', sans-serif;

    /* HQ Corporate Default Tokens */
    --primary-base: 201, 96%, 40%;
    /* #0284c7 HSL */
    --accent-base: 198, 93%, 60%;
    /* #38bdf8 HSL */

    /* Core Dark Mode Palette Default with Premium Ambient Glow */
    --bg-gradient: radial-gradient(circle at 80% 20%, rgba(74, 222, 128, 0.16) 0%, transparent 50%), radial-gradient(circle at 20% 80%, rgba(239, 68, 68, 0.12) 0%, transparent 50%), linear-gradient(135deg, #020c07 0%, #06130b 40%, #010603 100%);
    --bg-solid: #0f172a;
    --bg-glass: rgba(15, 23, 42, 0.65);
    --bg-glass-card: rgba(15, 23, 42, 0.85);
    --border-glass: rgba(255, 255, 255, 0.07);
    --border-glass-glow: rgba(2, 132, 199, 0.3);
    --bg-input: rgba(0, 0, 0, 0.35);
    --bg-input-focus: rgba(0, 0, 0, 0.5);
    --card-shadow: 0 4px 20px hsla(var(--primary-base), 0.4);

    --bg-panel: rgba(0, 0, 0, 0.15);
    --bg-chat-input: rgba(0, 0, 0, 0.25);
    --bg-message-ai: rgba(255, 255, 255, 0.03);
    --bg-suggestion-card: rgba(255, 255, 255, 0.02);

    --text-main: #f8fafc;
    --text-muted: #94a3b8;
    --text-glow: #e2e8f0;
    --text-bold: #ffffff;

    --shadow-glow: 0 0 25px rgba(2, 132, 199, 0.15);
    --transition-smooth: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
  }

  /* Light Theme Variables Overrides */
  body:not(.theme-dark) {
    --primary-base: 201, 96%, 30%;
    /* High contrast dark blue */
    --accent-base: 201, 96%, 40%;
    /* High contrast blue */
    --bg-gradient: linear-gradient(135deg, #f1f5f9 0%, #e2e8f0 50%, #cbd5e1 100%);
    --bg-solid: #f8fafc;
    --bg-glass: rgba(255, 255, 255, 0.45);
    --bg-glass-card: rgba(255, 255, 255, 0.75);
    --border-glass: rgba(15, 23, 42, 0.08);
    --border-glass-glow: rgba(2, 132, 199, 0.25);
    --bg-input: rgba(255, 255, 255, 0.6);
    --bg-input-focus: rgba(255, 255, 255, 0.85);
    --card-shadow: 0 10px 30px rgba(0, 0, 0, 0.06);

    --bg-panel: rgba(255, 255, 255, 0.25);
    --bg-chat-input: rgba(255, 255, 255, 0.5);
    --bg-message-ai: rgba(15, 23, 42, 0.05);
    --bg-suggestion-card: rgba(15, 23, 42, 0.03);

    --text-main: #0f172a;
    --text-muted: #64748b;
    --text-glow: #1e293b;
    --text-bold: #000000;

    --shadow-glow: 0 10px 30px rgba(2, 132, 199, 0.08);
  }

  /* Tropical Forest Theme Overwrite */
  body.theme-tropical {
    --primary-base: 122, 45%, 34%;
    /* #2e7d32 HSL */
    --accent-base: 142, 72%, 56%;
    /* #4ade80 HSL */
  }

  body.theme-tropical.theme-dark {
    --bg-gradient: radial-gradient(circle at 80% 20%, rgba(74, 222, 128, 0.15) 0%, transparent 50%), linear-gradient(135deg, #020d08 0%, #051a10 40%, #020905 100%);
    --border-glass-glow: rgba(46, 125, 50, 0.3);
    --shadow-glow: 0 0 25px rgba(46, 125, 50, 0.15);
  }

  body.theme-tropical:not(.theme-dark) {
    --primary-base: 122, 45%, 25%;
    /* High contrast dark green */
    --accent-base: 122, 45%, 35%;
    /* High contrast green */
    --bg-gradient: linear-gradient(135deg, #f0fdf4 0%, #dcfce7 50%, #bbf7d0 100%);
    --border-glass-glow: rgba(46, 125, 50, 0.25);
    --shadow-glow: 0 10px 30px rgba(46, 125, 50, 0.08);
  }

  /* Salsa Carnival Theme Overwrite */
  body.theme-salsa {
    --primary-base: 0, 78%, 57%;
    /* #e53e3e HSL */
    --accent-base: 0, 93%, 73%;
    /* #fca5a5 HSL */
  }

  body.theme-salsa.theme-dark {
    --bg-gradient: radial-gradient(circle at 80% 20%, rgba(239, 68, 68, 0.15) 0%, transparent 50%), linear-gradient(135deg, #120101 0%, #260505 40%, #0d0101 100%);
    --border-glass-glow: rgba(229, 62, 62, 0.3);
    --shadow-glow: 0 0 25px rgba(229, 62, 62, 0.15);
  }

  body.theme-salsa:not(.theme-dark) {
    --primary-base: 0, 75%, 40%;
    /* High contrast dark red */
    --accent-base: 0, 78%, 50%;
    /* High contrast red */
    --bg-gradient: linear-gradient(135deg, #fef2f2 0%, #fee2e2 50%, #fca5a5 100%);
    --border-glass-glow: rgba(229, 62, 62, 0.25);
    --shadow-glow: 0 10px 30px rgba(229, 62, 62, 0.08);
  }

  /* Clean Global Reset */
  * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
    scrollbar-width: thin;
    scrollbar-color: hsla(var(--primary-base), 0.5) rgba(0, 0, 0, 0.2);
  }

  body {
    font-family: var(--font-family-body);
    background: var(--bg-gradient);
    background-attachment: fixed;
    color: var(--text-main);
    min-height: 100vh;
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
  }

  body::before {
    content: '';
    position: fixed;
    top: 0;
    left: 0;
    width: 100vw;
    height: 100vh;
    background-image:
      linear-gradient(rgba(255, 255, 255, 0.015) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255, 255, 255, 0.015) 1px, transparent 1px);
    background-size: 30px 30px;
    background-position: center center;
    pointer-events: none;
    z-index: 0;
    transition: background-image 0.35s ease;
  }

  body:not(.theme-dark)::before {
    background-image:
      linear-gradient(rgba(15, 23, 42, 0.012) 1px, transparent 1px),
      linear-gradient(90deg, rgba(15, 23, 42, 0.012) 1px, transparent 1px);
  }

  h1,
  h2,
  h3,
  h4,
  .font-outfit {
    font-family: var(--font-family-title);
    letter-spacing: -0.02em;
  }

  /* Scrollbar Styles */
  ::-webkit-scrollbar {
    width: 6px;
    height: 6px;
  }

  ::-webkit-scrollbar-track {
    background: rgba(0, 0, 0, 0.15);
  }

  ::-webkit-scrollbar-thumb {
    background: hsla(var(--primary-base), 0.4);
    border-radius: 4px;
  }

  ::-webkit-scrollbar-thumb:hover {
    background: hsla(var(--primary-base), 0.7);
  }

  /* Glassmorphism Styles */
  .glassmorphic {
    background: var(--bg-glass);
    backdrop-filter: blur(16px) saturate(180%);
    -webkit-backdrop-filter: blur(16px) saturate(180%);
    border: 1px solid var(--border-glass);
  }

  .glassmorphic-glow {
    background: var(--bg-glass-card);
    backdrop-filter: blur(24px);
    -webkit-backdrop-filter: blur(24px);
    border: 1px solid var(--border-glass-glow);
    box-shadow: var(--shadow-glow);
  }

  /* 1. Double-Lock Login Screen Overlay */
  .login-overlay {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    z-index: 9999;
    background: var(--bg-gradient);
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 20px;
    transition: opacity 0.5s ease, visibility 0.5s ease;
  }

  .login-overlay.hidden {
    opacity: 0;
    visibility: hidden;
    pointer-events: none;
  }

  .login-card {
    width: 100%;
    max-width: 440px;
    border-radius: 20px;
    padding: 40px;
    text-align: center;
    transform: translateY(0);
    animation: cardFadeIn 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
  }

  .logo-pulse {
    width: 70px;
    height: 70px;
    border-radius: 50%;
    background: hsla(var(--primary-base), 0.2);
    border: 2px solid hsl(var(--primary-base));
    display: flex;
    justify-content: center;
    align-items: center;
    margin: 0 auto 20px auto;
    box-shadow: 0 0 20px hsla(var(--primary-base), 0.4);
    animation: logoPulse 2s infinite ease-in-out;
  }

  .logo-icon {
    font-size: 36px;
    color: hsl(var(--accent-base));
  }

  .logo-img {
    width: 100%;
    height: 100%;
    border-radius: 50%;
    object-fit: cover;
  }

  .login-header h1 {
    font-size: 32px;
    font-weight: 800;
    background: linear-gradient(135deg, #fff 0%, hsl(var(--accent-base)) 100%);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 5px;
  }

  .subtitle {
    color: var(--text-muted);
    font-size: 13px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.15em;
    margin-bottom: 30px;
  }

  .input-group {
    text-align: left;
    margin-bottom: 22px;
  }

  .input-group label {
    display: block;
    font-size: 12px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: var(--text-muted);
    margin-bottom: 8px;
    padding-left: 2px;
  }

  .input-wrapper {
    position: relative;
    width: 100%;
  }

  .input-wrapper input {
    width: 100%;
    padding: 14px 18px 14px 46px;
    border-radius: 12px;
    background: var(--bg-input);
    border: 1px solid var(--border-glass);
    color: var(--text-main);
    font-family: var(--font-family-body);
    font-size: 15px;
    outline: none;
    transition: var(--transition-smooth);
  }

  .input-wrapper input:focus {
    border-color: hsl(var(--primary-base));
    box-shadow: 0 0 10px hsla(var(--primary-base), 0.2);
    background: var(--bg-input-focus);
  }

  .input-icon {
    position: absolute;
    left: 16px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text-muted);
    font-size: 20px;
  }

  .btn-toggle-pin {
    position: absolute;
    right: 16px;
    top: 50%;
    transform: translateY(-50%);
    background: none;
    border: none;
    color: var(--text-muted);
    cursor: pointer;
    outline: none;
  }

  .btn-toggle-pin:hover {
    color: var(--text-main);
  }

  .btn-primary-glow {
    width: 100%;
    padding: 16px;
    border-radius: 12px;
    background: hsl(var(--primary-base));
    border: none;
    color: white;
    font-family: var(--font-family-title);
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 10px;
    box-shadow: var(--card-shadow);
    transition: var(--transition-smooth);
    outline: none;
  }

  .btn-primary-glow:hover {
    background: hsl(var(--accent-base));
    transform: translateY(-2px);
    box-shadow: 0 6px 24px hsla(var(--primary-base), 0.6);
  }

  .btn-primary-glow:active {
    transform: translateY(0);
  }

  .login-footer {
    margin-top: 35px;
    font-size: 11px;
    color: var(--text-muted);
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }

  /* Security Shake for authentication failure */
  .shake {
    animation: shakeAlert 0.4s ease-in-out;
  }

  /* 2. Glassmorphic Error Modals */
  .modal-overlay {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    z-index: 10000;
    background: rgba(0, 0, 0, 0.75);
    backdrop-filter: blur(10px);
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 20px;
    opacity: 0;
    visibility: hidden;
    transition: var(--transition-smooth);
    pointer-events: none;
  }

  .modal-overlay.active {
    opacity: 1;
    visibility: visible;
    pointer-events: auto;
  }

  #custom-dialog-modal {
    z-index: 10050;
  }

  .security-alert-card {
    width: 100%;
    max-width: 420px;
    border-radius: 20px;
    padding: 35px;
    text-align: center;
    border: 1px solid rgba(239, 68, 68, 0.4);
    box-shadow: 0 0 30px rgba(239, 68, 68, 0.25);
    transform: scale(0.9);
    transition: var(--transition-smooth);
  }

  .modal-overlay.active .security-alert-card {
    transform: scale(1);
  }

  .glass-alert {
    background: rgba(20, 10, 10, 0.95);
  }

  .alert-icon {
    font-size: 56px;
    color: #ef4444;
    margin-bottom: 20px;
  }

  .security-alert-card h2 {
    font-size: 24px;
    font-weight: 800;
    color: #ef4444;
    margin-bottom: 12px;
  }

  .security-alert-card p {
    color: var(--text-glow);
    font-size: 15px;
    line-height: 1.6;
    margin-bottom: 25px;
  }

  .security-alert-card p b {
    color: white;
    text-shadow: 0 0 10px rgba(255, 255, 255, 0.2);
  }

  .btn-alert-dismiss {
    width: 100%;
    padding: 14px;
    border-radius: 10px;
    background: #ef4444;
    border: none;
    color: white;
    font-family: var(--font-family-title);
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    transition: var(--transition-smooth);
  }

  .btn-alert-dismiss:hover {
    background: #f87171;
    box-shadow: 0 0 15px rgba(239, 68, 68, 0.4);
  }

  /* 3. Main Dashboard Grid SPA Layout */
  .app-container {
    display: flex;
    flex-direction: column;
    height: 100vh;
    width: 100vw;
    opacity: 1;
    transition: opacity 0.5s ease;
  }

  .app-container.hidden {
    opacity: 0;
    pointer-events: none;
  }

  .app-header {
    height: 70px;
    padding: 0 24px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    z-index: 10;
    border-bottom: 1px solid var(--border-glass);
  }

  .header-branding {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .brand-icon {
    font-size: 32px;
    color: hsl(var(--accent-base));
  }

  .brand-logo-img {
    height: 32px;
    width: 32px;
    object-fit: contain;
    border-radius: 6px;
    background: rgba(255, 255, 255, 0.05);
    border: 1px solid var(--border-glass);
    padding: 2px;
  }

  .brand-text h2 {
    font-size: 20px;
    font-weight: 800;
    background: linear-gradient(135deg, #fff 0%, hsl(var(--accent-base)) 100%);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 2px;
  }

  .brand-secondary-row {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .brand-subtitle {
    font-size: 11px;
    font-weight: 500;
    color: var(--text-muted);
  }

  .clearance-badge {
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    color: hsl(var(--accent-base));
    background: hsla(var(--primary-base), 0.15);
    border: 1px solid hsla(var(--primary-base), 0.3);
    padding: 2px 8px;
    border-radius: 4px;
    letter-spacing: 0.1em;
    display: inline-block;
    margin-top: 1px;
  }

  .header-controls {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  /* Architecture Toggle Button styling */
  .toggle-mode-wrapper {
    display: flex;
    align-items: center;
    gap: 8px;
    background: rgba(0, 0, 0, 0.35);
    border: 1px solid var(--border-glass);
    padding: 6px 12px;
    border-radius: 20px;
  }

  .toggle-mode-label {
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: var(--text-muted);
  }

  .mode-toggle-switch {
    width: 40px;
    height: 20px;
    background: rgba(255, 255, 255, 0.15);
    border-radius: 10px;
    border: none;
    cursor: pointer;
    position: relative;
    outline: none;
    transition: var(--transition-smooth);
  }

  .mode-toggle-switch.active {
    background: hsl(var(--primary-base));
  }

  .switch-handle {
    width: 14px;
    height: 14px;
    background: white;
    border-radius: 50%;
    position: absolute;
    top: 3px;
    left: 3px;
    transition: var(--transition-smooth);
  }

  .mode-toggle-switch.active .switch-handle {
    left: 23px;
  }

  .header-btn {
    height: 40px;
    width: 40px;
    border-radius: 50%;
    background: rgba(255, 255, 255, 0.05);
    border: 1px solid var(--border-glass);
    color: var(--text-glow);
    display: flex;
    justify-content: center;
    align-items: center;
    cursor: pointer;
    outline: none;
    gap: 3px;
    transition: var(--transition-smooth);
  }

  .header-btn:hover {
    background: hsla(var(--primary-base), 0.15);
    border-color: hsla(var(--primary-base), 0.4);
    color: white;
  }

  .header-btn#btn-lang-toggle,
  .header-btn#btn-manual-lang-toggle {
    width: auto;
    padding: 0 12px;
    border-radius: 20px;
  }

  .header-btn#btn-lang-toggle span:last-child {
    font-size: 12px;
    font-weight: 700;
  }

  .text-accent {
    color: hsl(var(--accent-base)) !important;
  }

  .dashboard-grid {
    flex: 1;
    display: grid;
    grid-template-columns: 320px 1fr;
    height: calc(100vh - 70px);
    width: 100vw;
    overflow: hidden;
  }

  /* 4. Collapsible Sidebar & History node */
  .sidebar {
    border-right: 1px solid var(--border-glass);
    display: flex;
    flex-direction: column;
    height: 100%;
    overflow: hidden;
  }

  #btn-sidebar-toggle {
    display: none;
  }

  .btn-close-sidebar {
    display: none;
    position: absolute;
    top: 15px;
    right: 15px;
    background: none;
    border: none;
    color: var(--text-muted);
    cursor: pointer;
    align-items: center;
    justify-content: center;
    outline: none;
    transition: var(--transition-smooth);
  }

  .btn-close-sidebar:hover {
    color: hsl(var(--accent-base));
  }

  .profile-card {
    position: relative;
    padding: 20px;
    border-bottom: 1px solid var(--border-glass);
    display: flex;
    align-items: center;
    gap: 15px;
  }

  .profile-avatar {
    font-size: 40px;
    color: hsl(var(--accent-base));
    display: flex;
    align-items: center;
  }

  .profile-details h3 {
    font-size: 15px;
    font-weight: 700;
    color: var(--text-main);
  }

  .profile-details p {
    font-size: 12px;
    color: var(--text-muted);
    word-break: break-all;
  }

  .profile-capsules {
    display: flex;
    gap: 5px;
    margin-top: 5px;
  }

  .badge-sub {
    font-size: 9px;
    font-weight: 700;
    padding: 1px 6px;
    border-radius: 3px;
    background: rgba(255, 255, 255, 0.08);
    border: 1px solid var(--border-glass);
    color: var(--text-muted);
  }

  .feedback-badge {
    font-size: 9px;
    font-weight: 700;
    background: hsla(var(--primary-base), 0.15);
    border: 1px solid hsla(var(--primary-base), 0.3);
    padding: 1px 5px;
    border-radius: 4px;
    color: hsl(var(--accent-base));
    margin-left: 6px;
    display: inline-block;
    vertical-align: middle;
  }

  .badge-role-director {
    color: #fbbf24;
    background: rgba(251, 191, 36, 0.1);
    border-color: rgba(251, 191, 36, 0.2);
  }

  /* === PREMIUM FEEDBACK ADMIN SYSTEM STYLES === */
  .feedback-admin-stats {
    display: flex;
    gap: 15px;
    margin-bottom: 20px;
  }

  .feedback-stat-card {
    flex: 1;
    padding: 12px 15px;
    border-radius: 8px;
    background: rgba(15, 23, 42, 0.4);
    border: 1px solid var(--border-glass);
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .feedback-stat-card .stat-icon {
    font-size: 24px;
    color: hsl(var(--accent-base));
  }

  .feedback-stat-card.stat-pending .stat-icon {
    color: #fbbf24;
  }

  .feedback-stat-card.stat-completed .stat-icon {
    color: #10b981;
  }

  .feedback-stat-card div {
    display: flex;
    flex-direction: column;
  }

  .feedback-stat-card .stat-val {
    font-size: 1.25rem;
    font-weight: 800;
    color: var(--text-main);
  }

  .feedback-stat-card .stat-label {
    font-size: 0.75rem;
    color: var(--text-muted);
  }

  .feedback-filter-tabs {
    display: flex;
    gap: 8px;
    margin-bottom: 15px;
    border-bottom: 1px solid var(--border-glass);
    padding-bottom: 10px;
  }

  .feedback-filter-btn {
    background: rgba(255, 255, 255, 0.03);
    border: 1px solid var(--border-glass);
    border-radius: 20px;
    color: var(--text-muted);
    padding: 5px 15px;
    font-size: 0.8rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s ease;
  }

  .feedback-filter-btn:hover {
    color: var(--text-main);
    background: rgba(255, 255, 255, 0.08);
  }

  .feedback-filter-btn.active {
    color: var(--primary);
    background: var(--primary-glow);
    border-color: var(--border-accent);
  }

  .feedback-table-wrapper {
    max-height: 380px;
    overflow-y: auto;
    border-radius: 8px;
    border: 1px solid var(--border-glass);
    background: rgba(15, 23, 42, 0.3);
  }

  .feedback-admin-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.85rem;
    color: var(--text-main);
    text-align: left;
  }

  .feedback-admin-table th {
    background: rgba(15, 23, 42, 0.8);
    padding: 12px 15px;
    font-weight: 700;
    color: var(--text-glow);
    border-bottom: 1px solid var(--border-glass);
    position: sticky;
    top: 0;
    z-index: 2;
  }

  .feedback-admin-table td {
    padding: 12px 15px;
    border-bottom: 1px solid rgba(255, 255, 255, 0.04);
    vertical-align: middle;
  }

  .feedback-admin-table tbody tr:hover {
    background: rgba(255, 255, 255, 0.02);
  }

  .feedback-row-timestamp {
    color: var(--text-muted);
    font-size: 0.75rem;
    white-space: nowrap;
  }

  .feedback-row-email {
    font-weight: 600;
    color: var(--text-main);
    word-break: break-all;
    max-width: 130px;
  }

  .feedback-row-text {
    line-height: 1.4;
    word-break: break-word;
    color: var(--text-main);
  }

  .status-select-wrapper {
    position: relative;
    display: inline-block;
  }

  .status-select {
    appearance: none;
    -webkit-appearance: none;
    -moz-appearance: none;
    border-radius: 6px;
    padding: 4px 24px 4px 10px;
    font-size: 0.75rem;
    font-weight: 700;
    border: 1px solid transparent;
    cursor: pointer;
    font-family: var(--font-family-body);
    outline: none;
    transition: all 0.2s ease;
  }

  .status-select-wrapper::after {
    content: "expand_more";
    font-family: "Material Icons Round";
    font-weight: 400;
    font-size: 14px;
    position: absolute;
    right: 6px;
    top: 50%;
    transform: translateY(-50%);
    pointer-events: none;
    color: inherit;
  }

  .status-select.pending {
    background: rgba(251, 191, 36, 0.1);
    color: #fbbf24;
    border-color: rgba(251, 191, 36, 0.2);
  }

  .status-select.pending:hover {
    background: rgba(251, 191, 36, 0.18);
  }

  .status-select.completed {
    background: rgba(16, 185, 129, 0.1);
    color: #10b981;
    border-color: rgba(16, 185, 129, 0.2);
  }

  .status-select.completed:hover {
    background: rgba(16, 185, 129, 0.18);
  }

  .feedback-row-comments {
    width: 100%;
    min-width: 150px;
    background: rgba(15, 23, 42, 0.5);
    border: 1px solid var(--border-glass);
    border-radius: 6px;
    color: var(--text-main);
    padding: 6px 8px;
    font-size: 0.8rem;
    font-family: var(--font-family-body);
    resize: vertical;
    outline: none;
    transition: all 0.2s ease;
  }

  .feedback-row-comments:focus {
    border-color: hsl(var(--accent-base));
    background: rgba(15, 23, 42, 0.8);
  }

  /* Settings drop panel inside sidebar */
  .dev-settings-box {
    border-bottom: 1px solid var(--border-glass);
  }

  .dev-settings-trigger {
    width: 100%;
    padding: 12px 20px;
    background: none;
    border: none;
    color: var(--text-muted);
    font-family: var(--font-family-body);
    font-size: 12px;
    font-weight: 600;
    display: flex;
    align-items: center;
    justify-content: space-between;
    cursor: pointer;
    outline: none;
  }

  .dev-settings-trigger:hover {
    color: var(--text-main);
    background: rgba(255, 255, 255, 0.02);
  }

  .dev-settings-panel {
    padding: 0 20px 20px 20px;
    background: var(--bg-panel);
    animation: slideDown 0.3s ease;
  }

  .dev-input-group {
    margin-top: 12px;
  }

  .dev-input-group label {
    display: block;
    font-size: 10px;
    font-weight: 700;
    color: var(--text-muted);
    text-transform: uppercase;
    margin-bottom: 4px;
  }

  .dev-input-group input {
    width: 100%;
    padding: 8px 12px;
    background: var(--bg-input);
    border: 1px solid var(--border-glass);
    border-radius: 6px;
    color: var(--text-main);
    font-size: 11px;
    font-family: var(--font-family-body);
    outline: none;
  }

  .dev-input-group input:focus {
    border-color: hsl(var(--primary-base));
  }

  .sidebar-header {
    padding: 20px 20px 10px 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    color: var(--text-muted);
    font-size: 10px;
    font-weight: 800;
    letter-spacing: 0.1em;
  }

  .btn-icon-sm {
    background: none;
    border: none;
    color: var(--text-muted);
    cursor: pointer;
    outline: none;
    display: flex;
    align-items: center;
  }

  .btn-icon-sm:hover {
    color: hsl(var(--accent-base));
  }

  .history-list {
    flex: 1;
    overflow-y: auto;
    padding: 0 12px 20px 12px;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .history-empty {
    padding: 20px;
    text-align: center;
    color: var(--text-muted);
    font-size: 12px;
    font-style: italic;
  }

  /* History Conversational Node styling */
  .history-item {
    width: 100%;
    padding: 12px 14px;
    background: rgba(255, 255, 255, 0.02);
    border: 1px solid var(--border-glass);
    border-radius: 10px;
    color: var(--text-glow);
    display: flex;
    align-items: center;
    justify-content: space-between;
    cursor: pointer;
    position: relative;
    transition: var(--transition-smooth);
  }

  .history-item:hover {
    background: hsla(var(--primary-base), 0.1);
    border-color: hsla(var(--primary-base), 0.3);
    transform: translateX(3px);
  }

  .history-item.active {
    background: hsla(var(--primary-base), 0.15);
    border-color: hsl(var(--primary-base));
    color: white;
    box-shadow: 0 0 15px hsla(var(--primary-base), 0.05);
  }

  .history-item-left {
    display: flex;
    align-items: center;
    gap: 10px;
    flex: 1;
    min-width: 0;
  }

  .history-item-left span:first-child {
    font-size: 18px;
    color: var(--text-muted);
  }

  .history-item.active .history-item-left span:first-child {
    color: hsl(var(--accent-base));
  }

  .history-item-title {
    font-size: 13px;
    font-weight: 500;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    flex: 1;
  }

  .icon-gold {
    color: #fbbf24 !important;
  }

  .btn-item-options {
    background: none;
    border: none;
    color: var(--text-muted);
    cursor: pointer;
    outline: none;
    display: flex;
    align-items: center;
    opacity: 0;
    transition: opacity 0.2s ease;
  }

  .history-item:hover .btn-item-options,
  .history-item.active .btn-item-options {
    opacity: 1;
  }

  .sidebar-footer {
    padding: 16px;
    border-top: 1px solid var(--border-glass);
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }

  .btn-sidebar-action {
    padding: 12px;
    border-radius: 8px;
    background: rgba(255, 255, 255, 0.05);
    border: 1px solid var(--border-glass);
    color: var(--text-main);
    font-family: var(--font-family-title);
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    transition: var(--transition-smooth);
  }

  .btn-sidebar-action:hover {
    background: hsla(var(--primary-base), 0.15);
    border-color: hsla(var(--primary-base), 0.4);
  }

  .btn-logout:hover {
    background: rgba(239, 68, 68, 0.15);
    border-color: rgba(239, 68, 68, 0.4);
    color: #f87171;
  }

  /* 5. Central Chat Viewport and Messages */
  .chat-viewport {
    display: flex;
    flex-direction: column;
    height: 100%;
    overflow: hidden;
    background: var(--bg-panel);
  }

  .chat-feed {
    flex: 1;
    overflow-y: auto;
    padding: 30px 40px;
    display: flex;
    flex-direction: column;
    gap: 25px;
  }

  .welcome-box {
    max-width: 580px;
    margin: auto;
    text-align: center;
    padding: 40px 20px;
  }

  .welcome-logo-icon {
    font-size: 72px;
    color: hsl(var(--accent-base));
    margin-bottom: 20px;
    text-shadow: var(--shadow-glow);
  }

  .welcome-box h1 {
    font-size: 36px;
    font-weight: 800;
    margin-bottom: 12px;
  }

  .welcome-box p {
    font-size: 15px;
    color: var(--text-muted);
    line-height: 1.6;
    margin-bottom: 30px;
  }

  /* Fast-Click suggested queries styling */
  .suggestions-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    text-align: left;
  }

  .suggestion-card {
    padding: 16px;
    border-radius: 12px;
    background: var(--bg-suggestion-card);
    border: 1px solid var(--border-glass);
    cursor: pointer;
    transition: var(--transition-smooth);
  }

  .suggestion-card:hover {
    background: hsla(var(--primary-base), 0.08);
    border-color: hsla(var(--primary-base), 0.3);
    transform: translateY(-2px);
  }

  .suggestion-card h4 {
    font-size: 13px;
    font-weight: 700;
    color: hsl(var(--accent-base));
    margin-bottom: 4px;
  }

  .suggestion-card p {
    font-size: 11px;
    color: var(--text-muted);
    line-height: 1.4;
    margin-bottom: 0;
  }

  /* Chat bubble designs */
  .chat-message {
    display: flex;
    flex-direction: column;
    max-width: 80%;
    animation: messageFadeIn 0.4s ease-out;
  }

  .chat-message.user {
    align-self: flex-end;
  }

  .chat-message.ai {
    align-self: flex-start;
  }

  .message-meta {
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-bottom: 6px;
    color: var(--text-muted);
  }

  .chat-message.user .message-meta {
    align-self: flex-end;
    color: hsl(var(--accent-base));
  }

  .message-bubble {
    padding: 16px 20px;
    border-radius: 16px;
    font-size: 14px;
    line-height: 1.6;
    position: relative;
  }

  .chat-message.user .message-bubble {
    background: hsl(var(--primary-base));
    color: white;
    border-bottom-right-radius: 4px;
    box-shadow: 0 4px 15px hsla(var(--primary-base), 0.25);
  }

  .chat-message.ai .message-bubble {
    background: var(--bg-message-ai);
    border: 1px solid var(--border-glass);
    color: var(--text-glow);
    border-bottom-left-radius: 4px;
  }

  .message-bubble b {
    color: var(--text-bold);
    font-weight: 700;
  }

  .message-bubble a,
  .chat-link {
    color: hsl(var(--accent-base));
    text-decoration: none;
    font-weight: 600;
    border-bottom: 1px dashed hsla(var(--accent-base), 0.5);
    transition: var(--transition-smooth);
    word-break: break-all;
  }

  .message-bubble a:hover,
  .chat-link:hover {
    color: var(--text-bold);
    border-bottom-style: solid;
    border-bottom-color: var(--text-bold);
  }

  .chat-message.user .message-bubble a,
  .chat-message.user .chat-link {
    color: #fff;
    border-bottom-color: rgba(255, 255, 255, 0.6);
  }

  .chat-message.user .message-bubble a:hover,
  .chat-message.user .chat-link:hover {
    color: var(--text-glow);
    border-bottom-color: var(--text-glow);
  }

  .message-bubble br {
    margin-bottom: 8px;
  }

  /* Responsive Premium Chat Tables */
  .table-responsive {
    width: 100%;
    overflow-x: auto;
    margin: 12px 0;
    border-radius: 8px;
    box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
  }

  .premium-chat-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.85rem;
    text-align: left;
    background: rgba(255, 255, 255, 0.03);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    border: 1px solid rgba(255, 255, 255, 0.1);
  }

  .premium-chat-table th {
    background: rgba(255, 255, 255, 0.08);
    color: #e2e8f0;
    padding: 10px 12px;
    font-weight: 600;
    text-transform: uppercase;
    font-size: 0.75rem;
    letter-spacing: 0.05em;
    border-bottom: 2px solid rgba(255, 255, 255, 0.15);
  }

  .premium-chat-table td {
    padding: 10px 12px;
    color: #cbd5e1;
    border-bottom: 1px solid rgba(255, 255, 255, 0.05);
    white-space: nowrap;
  }

  .premium-chat-table tr:last-child td {
    border-bottom: none;
  }

  .premium-chat-table tr:hover {
    background: rgba(255, 255, 255, 0.05);
  }

  /* Typing pulse */
  .typing-indicator {
    display: flex;
    align-items: center;
    gap: 6px;
    align-self: flex-start;
    margin-left: 40px;
    margin-bottom: 20px;
    animation: messageFadeIn 0.3s ease-out;
  }

  .typing-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: hsl(var(--primary-base));
    animation: typingPulse 1.4s infinite ease-in-out;
  }

  .typing-dot:nth-child(2) {
    animation-delay: 0.2s;
    background: hsl(var(--accent-base));
  }

  .typing-dot:nth-child(3) {
    animation-delay: 0.4s;
    background: white;
  }

  .typing-label {
    font-size: 11px;
    font-weight: 600;
    color: var(--text-muted);
    margin-left: 6px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }

  /* 6. Text Prompt Bar and floating triggers */
  .chat-input-bar {
    margin: 0 40px 30px 40px;
    padding: 10px 16px;
    border-radius: 16px;
    display: flex;
    align-items: center;
    gap: 12px;
    background: var(--bg-chat-input);
    border: 1px solid var(--border-glass);
  }

  .chat-action-btn {
    height: 44px;
    width: 44px;
    border-radius: 12px;
    background: none;
    border: none;
    color: var(--text-muted);
    cursor: pointer;
    outline: none;
    display: flex;
    justify-content: center;
    align-items: center;
    transition: var(--transition-smooth);
  }

  .chat-action-btn:hover {
    background: rgba(255, 255, 255, 0.05);
    color: white;
  }

  /* Voice Mic listening state pulse red */
  .chat-action-btn#btn-voice-mic.recording {
    background: rgba(239, 68, 68, 0.25);
    border: 1px solid rgba(239, 68, 68, 0.5);
    color: #f87171;
    animation: micGlowPulse 1.5s infinite;
  }

  .chat-input-bar textarea {
    flex: 1;
    background: none;
    border: none;
    color: var(--text-main);
    font-family: var(--font-family-body);
    font-size: 14px;
    resize: none;
    outline: none;
    padding: 10px 0;
    line-height: 1.5;
    max-height: 120px;
  }

  .btn-send {
    height: 44px;
    width: 44px;
    border-radius: 12px;
    background: hsl(var(--primary-base));
    border: none;
    color: white;
    cursor: pointer;
    display: flex;
    justify-content: center;
    align-items: center;
    transition: var(--transition-smooth);
    outline: none;
  }

  .btn-send:hover {
    background: hsl(var(--accent-base));
    box-shadow: 0 0 15px hsla(var(--primary-base), 0.4);
  }

  /* Send button spinner loading */
  .btn-send.loading span {
    animation: spin 1s infinite linear;
  }

  /* 7. Custom Context Menu Overlay */
  .context-menu {
    position: fixed;
    z-index: 10000;
    width: 220px;
    background: rgba(15, 23, 42, 0.95);
    backdrop-filter: blur(12px);
    border: 1px solid var(--border-glass-glow);
    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5), var(--shadow-glow);
    border-radius: 12px;
    display: none;
    animation: contextMenuReveal 0.2s ease;
  }

  .context-menu ul {
    list-style: none;
    padding: 6px;
  }

  .context-menu li {
    padding: 10px 14px;
    font-size: 13px;
    font-weight: 500;
    color: var(--text-glow);
    border-radius: 8px;
    display: flex;
    align-items: center;
    gap: 10px;
    cursor: pointer;
    transition: var(--transition-smooth);
  }

  .context-menu li:hover {
    background: hsla(var(--primary-base), 0.2);
    color: var(--text-bold);
  }

  .context-menu li.menu-danger {
    color: #f87171;
  }

  .context-menu li.menu-danger:hover {
    background: rgba(239, 68, 68, 0.2);
    color: #ef4444;
  }

  .menu-icon {
    font-size: 18px;
  }

  /* 8. Operations Manual Modal styling */
  .manual-card {
    width: 100%;
    max-width: 800px;
    height: 80vh;
    border-radius: 20px;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    border: 1px solid var(--border-glass-glow);
    box-shadow: var(--shadow-glow);
    transform: translateY(20px);
    transition: var(--transition-smooth);
  }

  .modal-overlay.active .manual-card {
    transform: translateY(0);
  }

  .manual-header {
    height: 70px;
    padding: 0 30px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-bottom: 1px solid var(--border-glass);
  }

  .manual-header .header-left {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .manual-header h2 {
    font-size: 20px;
    font-weight: 800;
    background: linear-gradient(135deg, #fff 0%, hsl(var(--accent-base)) 100%);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .btn-close-manual {
    background: none;
    border: none;
    color: var(--text-muted);
    cursor: pointer;
    outline: none;
    display: flex;
    align-items: center;
  }

  .btn-close-manual:hover {
    color: var(--text-bold);
  }

  .manual-tabs {
    display: flex;
    padding: 0 20px;
    background: var(--bg-panel);
    border-bottom: 1px solid var(--border-glass);
  }

  .manual-tab-btn {
    padding: 16px 20px;
    background: none;
    border: none;
    font-family: var(--font-family-title);
    font-size: 14px;
    font-weight: 600;
    color: var(--text-muted);
    cursor: pointer;
    outline: none;
    position: relative;
    transition: var(--transition-smooth);
  }

  .manual-tab-btn:hover {
    color: var(--text-bold);
  }

  .manual-tab-btn.active {
    color: hsl(var(--accent-base));
  }

  .manual-tab-btn.active::after {
    content: '';
    position: absolute;
    bottom: -1px;
    left: 20px;
    right: 20px;
    height: 2px;
    background: hsl(var(--accent-base));
    box-shadow: 0 0 10px hsl(var(--accent-base));
  }

  .manual-body {
    flex: 1;
    overflow-y: auto;
    padding: 30px;
  }

  .manual-tab-content h3 {
    font-size: 18px;
    font-weight: 700;
    margin-bottom: 15px;
    color: var(--text-main);
  }

  .manual-tab-content h4 {
    font-size: 14px;
    font-weight: 700;
    margin: 20px 0 8px 0;
    color: hsl(var(--accent-base));
  }

  .manual-tab-content p {
    font-size: 14px;
    color: var(--text-glow);
    line-height: 1.6;
    margin-bottom: 15px;
  }

  .manual-tab-content ul,
  .manual-tab-content ol {
    padding-left: 20px;
    margin-bottom: 15px;
  }

  .manual-tab-content li {
    font-size: 14px;
    color: var(--text-glow);
    line-height: 1.6;
    margin-bottom: 8px;
  }

  .manual-diagram {
    background: rgba(0, 0, 0, 0.4);
    border: 1px solid var(--border-glass);
    border-radius: 8px;
    padding: 15px;
    margin: 15px 0;
    overflow-x: auto;
  }

  .manual-diagram pre {
    font-family: monospace;
    font-size: 12px;
    color: hsl(var(--accent-base));
  }

  /* Animations */
  @keyframes cardFadeIn {
    from {
      opacity: 0;
      transform: translateY(20px);
    }

    to {
      opacity: 1;
      transform: translateY(0);
    }
  }

  @keyframes logoPulse {
    0% {
      transform: scale(1);
      box-shadow: 0 0 20px hsla(var(--primary-base), 0.4);
    }

    50% {
      transform: scale(1.05);
      box-shadow: 0 0 35px hsla(var(--primary-base), 0.6);
    }

    100% {
      transform: scale(1);
      box-shadow: 0 0 20px hsla(var(--primary-base), 0.4);
    }
  }

  @keyframes shakeAlert {

    0%,
    100% {
      transform: translateX(0);
    }

    20%,
    60% {
      transform: translateX(-8px);
    }

    40%,
    80% {
      transform: translateX(8px);
    }
  }

  @keyframes messageFadeIn {
    from {
      opacity: 0;
      transform: translateY(8px);
    }

    to {
      opacity: 1;
      transform: translateY(0);
    }
  }

  @keyframes typingPulse {

    0%,
    100% {
      transform: translateY(0);
    }

    50% {
      transform: translateY(-6px);
    }
  }

  @keyframes micGlowPulse {
    0% {
      box-shadow: 0 0 5px rgba(239, 68, 68, 0.4);
    }

    50% {
      box-shadow: 0 0 20px rgba(239, 68, 68, 0.7);
    }

    100% {
      box-shadow: 0 0 5px rgba(239, 68, 68, 0.4);
    }
  }

  @keyframes spin {
    to {
      transform: rotate(360deg);
    }
  }

  @keyframes slideDown {
    from {
      opacity: 0;
