  // HTML ESCAPING HELPER
  function escapeHtml(text) {
    if (!text) return "";
    return text
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;")
      .replace(/'/g, "&#039;");
  }

  // SAFE STORAGE COMPATIBILITY LAYER (Protects against sandboxed iframe localStorage SecurityErrors)
  const storageFallback = {};

  function safeGetItem(key) {
    try {
      return window.localStorage ? window.localStorage.getItem(key) : storageFallback[key];
    } catch (e) {
      console.warn("Storage access denied. Falling back to memory storage.", e);
      return storageFallback[key] || "";
    }
  }

  function safeSetItem(key, val) {
    try {
      if (window.localStorage) {
        window.localStorage.setItem(key, val);
      } else {
        storageFallback[key] = val;
      }
    } catch (e) {
      console.warn("Storage access denied. Falling back to memory storage.", e);
      storageFallback[key] = val;
    }
  }

  function loadAllSettings() {
    // 1. First, load from standard safeGetItem (localStorage/fallback)
    hydrateDevSettings();

    // Auto-enable worker mode if a worker URL is configured

      const switchBtn = document.getElementById("architecture-toggle");
      if (switchBtn) {
        switchBtn.classList.add("active");
      }
    }

    // 2. If in GAS, asynchronously fetch from server UserProperties
    const isGAS = window.location.hostname.includes('googleusercontent.com') || window.location.hostname.includes('script.google.com') || window.location.hostname.includes('google.com');
    if (isGAS && typeof google !== 'undefined' && google.script && google.script.run) {
      google.script.run
        .withSuccessHandler((res) => {
          if (res && res.success && res.settings) {
            console.log("Loaded persistent settings from Apps Script server UserProperties:", res.settings);
            // Save to memory cache / safe storage layer
            if (res.settings.gas_url) saveNetworkSetting("gas_url", res.settings.gas_url);
            if (res.settings.worker_url) saveNetworkSetting("worker_url", res.settings.worker_url);
            if (res.settings.gemini_key) saveNetworkSetting("gemini_key", res.settings.gemini_key);
            
            // Re-hydrate text fields immediately
            hydrateDevSettings();
          }
        })
        .loadServerSettings();
    }
  }


  /**
   * Double-Lock Security Authentication gateway.
   */
  function handleAuth(event) {
    event.preventDefault();

    const email = document.getElementById("login-email").value.trim();
    const pin = document.getElementById("login-pin").value.trim();
    const btnSubmit = document.getElementById("btn-login-submit");
    const loginCard = document.querySelector(".login-card");

    // Set visual loading state
    btnSubmit.disabled = true;
    btnSubmit.innerHTML = `<span>Validating credentials...</span><span class="material-icons-round spin">sync</span>`;
    loginCard.classList.remove("shake");

    if (!email || !pin) {
      triggerSecurityAlert(email, "Credentials missing. Email and PIN required.");
      resetAuthButtonState(btnSubmit);
      return;
    }

    // Determine route based on Active selection or local config override
    const gasUrl = getNetworkSetting("gas_url");
    const workerUrl = getNetworkSetting("worker_url");
    const keyLocal = getNetworkSetting("gemini_key");

    if (isWorkerMode && workerUrl) {
      // Cloudflare Worker auth routing
      fetch(workerUrl, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'X-Apps-Script-Url': gasUrl,
          'X-Gemini-Key': keyLocal
        },
        body: JSON.stringify({ email, pin, query: "Validate credentials handshake." })
      })
        .then(res => res.json())
        .then(data => {
          if (data.success) {
            completeHandshake(data.user);
          } else {
            triggerSecurityAlert(email, data.error);
          }
        })
        .catch(err => {
          triggerSecurityAlert(email, "System Handshake Timeout. Check worker address or API key.");
        })
        .finally(() => resetAuthButtonState(btnSubmit));
    } else {
      // Direct Apps Script authorization routing
      if (typeof google !== 'undefined' && google.script && google.script.run) {
        google.script.run
          .withSuccessHandler((user) => {
            resetAuthButtonState(btnSubmit);
            if (user && user.success) {
              completeHandshake(user);
            } else {
              triggerSecurityAlert(email, user ? user.error : "Mismatched security clearance.");
            }
          })
          .withFailureHandler((err) => {
            resetAuthButtonState(btnSubmit);
            triggerSecurityAlert(email, err.message || err.toString());
          })
          .directValidateCredentials(email, pin);
      } else {
        // Offline fallback / Mock local preview runner if running locally without Apps Script container
        resetAuthButtonState(btnSubmit);
        runMockLocalAuth(email, pin);
      }
    }
  }

  function resetAuthButtonState(btn) {
    btn.disabled = false;
    btn.innerHTML = `<span>Initiate Security Handshake</span><span class="material-icons-round">vpn_key</span>`;

  function completeHandshake(user) {

    document.getElementById("badge-id").innerText = user.performerId;

    const roleBadge = document.getElementById("badge-role");
    const clearanceHeader = document.getElementById("badge-clearance-header");

    const devSettingsBox = document.querySelector(".dev-settings-box");
    const adminFeedbackBtn = document.getElementById("btn-feedback-admin");
    const adminInventoryBtn = document.getElementById("btn-inventory-admin");
    const isInventoryAdmin = user.email === "rodriguez2113@gmail.com" || user.email === "darienl140@gmail.com";
    if (user.clearance === "director") {
      roleBadge.innerText = "Director";
      roleBadge.className = "badge-sub badge-role-director";
      clearanceHeader.innerText = i18n[currentLanguage].directorClearance;
      if (devSettingsBox) devSettingsBox.style.display = "block";
      if (adminFeedbackBtn) adminFeedbackBtn.style.display = "flex";
    } else {
      roleBadge.innerText = "Performer";
      roleBadge.className = "badge-sub";
      clearanceHeader.innerText = i18n[currentLanguage].performerClearance;
      if (devSettingsBox) devSettingsBox.style.display = "none";
      if (adminFeedbackBtn) adminFeedbackBtn.style.display = "none";
    }
    if (adminInventoryBtn) {
      adminInventoryBtn.style.display = isInventoryAdmin ? "flex" : "none";
    }

    // Slide out overlay and reveal app
    document.getElementById("login-overlay").classList.add("hidden");
    document.getElementById("app-container").classList.remove("hidden");

    // Load conversation details
    renderSuggestedPrompts();
    renderHistorySidebar();

    // If conversations already exist, activate the latest; else create new
    if (conversations.length > 0) {
      activateConversation(conversations[0].id);
    } else {
      createNewChat();
    }

    // Retrieve and update visual feedback stats counter
    updateFeedbackCounter();
    updateInventoryCounter();

    // Hydrate Network & API settings
    hydrateDevSettings();
  }

  /**
   * Custom visual security alerts mapping exact errors.
   */
  function triggerSecurityAlert(email, errMsg) {
    const card = document.querySelector(".login-card");
    card.classList.add("shake");

    const userLang = (navigator.language || navigator.userLanguage || "en").toLowerCase();
    const isSpanish = (currentLanguage === "es" || userLang.startsWith("es"));
    const formattedErr = isSpanish ? "¡Coño! Falta el Email o PIN" : "¡Coño! Correct your Email or PIN.";

    document.getElementById("security-alert-title").innerText = isSpanish ? "Acceso Denegado" : "Access Denied";

    let displayMsg = errMsg;
    if (isSpanish) {
      if (errMsg.includes("but I don't see that email in our performer records")) {
        displayMsg = "Veo que estás escribiendo desde <b>" + email + "</b>, pero no encuentro ese correo en nuestros registros de bailarines. Vuelve a ingresar tu correo, carajo.";
      } else if (errMsg.includes("but I don't see that code associated")) {
        displayMsg = "Veo que estás escribiendo desde <b>" + email + "</b>, pero no veo ese código asociado a ese correo en nuestros registros. ¡Carajo! ¿Olvidaste tu código?";
      } else if (errMsg.includes("Credentials missing")) {
        displayMsg = "¡Faltan credenciales! Se requiere correo electrónico y PIN.";
      }
    }

    // Append random Puerto Rican slang to security error messages
    const slang = getSlangSuffix();
    if (!displayMsg.includes("Puñueta") && !displayMsg.includes("Coño") && !displayMsg.includes("Carajo")) {
      displayMsg = displayMsg.trim();
      if (displayMsg.endsWith(".") || displayMsg.endsWith("!")) {
        displayMsg = displayMsg.substring(0, displayMsg.length - 1);
      }
      displayMsg += `, ${slang}!`;
    }

    document.getElementById("security-alert-message").innerHTML = `<div style="font-weight: 700; margin-bottom: 12px;">${formattedErr}</div><div style="font-size: 13px; color: var(--text-muted); line-height: 1.4;">${displayMsg}</div>`;
    document.getElementById("security-alert-modal").classList.add("active");

    const dismissBtn = document.querySelector(".btn-alert-dismiss");
    if (dismissBtn) {
      dismissBtn.innerText = isSpanish ? "Reintentar Acceso" : "Retry Access";
    }
  }

    document.getElementById("security-alert-modal").classList.remove("active");

  /**
   * Dispatches prompt and routes payload.
   */
  function submitUserQuery() {
    const inputEl = document.getElementById("chat-input");
    const query = inputEl.value.trim();
    if (!query) return;

    // Append user message immediately to layout
    appendChatMessage("user", query);
    inputEl.value = "";

    // Hide empty state welcome panel
    const welcomePanel = document.getElementById("welcome-message-box");
    if (welcomePanel) welcomePanel.style.display = "none";

    // Trigger loading spinner
    const btnSend = document.getElementById("btn-send-message");
    const sendIcon = document.getElementById("send-btn-icon");
    const typingIndicator = document.getElementById("typing-indicator");

    btnSend.disabled = true;
    btnSend.classList.add("loading");
    sendIcon.innerText = "sync";
    typingIndicator.classList.remove("hidden");

    // Scroll chat feed
    scrollToBottom();

    // Core Dual Route Dispatcher
    const email = sessionUser.email;
    const pin = getPINAuth();

    const devGasUrl = getNetworkSetting("gas_url");
    const devWorkerUrl = getNetworkSetting("worker_url");
    const devKey = getNetworkSetting("gemini_key");

    const activeChat = conversations.find(c => c.id === activeChatId) || { messages: [] };
    const historyPayload = activeChat.messages || [];

    if (isWorkerMode && devWorkerUrl) {
      // Pipeline B: Cloudflare Worker Hybrid HTTP POST
      fetch(devWorkerUrl, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'X-Apps-Script-Url': devGasUrl,
          'X-Gemini-Key': devKey
        },
        body: JSON.stringify({ email, pin, query, language: currentLanguage, history: historyPayload })
      })
        .then(res => res.json())
        .then(data => {
          typingIndicator.classList.add("hidden");
          if (data.success) {
            appendChatMessage("ai", data.response);
            saveMessageToActiveHistory("ai", data.response);
          } else {
            appendChatMessage("ai", `Fallo en el gateway de El Patrón: ${data.error}`);
          }
        })
        .catch(err => {
          typingIndicator.classList.add("hidden");
          appendChatMessage("ai", `Error al conectar con la armadura del Edge Router. Verifique configuraciones.`);
        })
        .finally(() => resetSenderButton(btnSend, sendIcon));
    } else {
      // Pipeline A: Consolidated Apps Script Direct Invoke
      if (typeof google !== 'undefined' && google.script && google.script.run) {
        google.script.run
          .withSuccessHandler((res) => {
            typingIndicator.classList.add("hidden");
            resetSenderButton(btnSend, sendIcon);
            if (res && res.success) {
              appendChatMessage("ai", res.response);
              saveMessageToActiveHistory("ai", res.response);
            } else {
              appendChatMessage("ai", `Carajo, ocurrió un error en el backend: ${res ? res.error : "Sin respuesta"}`);
            }
          })
          .withFailureHandler((err) => {
            typingIndicator.classList.add("hidden");
            resetSenderButton(btnSend, sendIcon);
            appendChatMessage("ai", `Falla de red en Google Apps Script: ${err.message || err.toString()}`);
          })
          .directQueryGemini(email, pin, query, currentLanguage, historyPayload);
      } else {
        // Offline fallback simulation
        setTimeout(() => {
          typingIndicator.classList.add("hidden");
          resetSenderButton(btnSend, sendIcon);
          const reply = runMockAIResponse(query);
          appendChatMessage("ai", reply);
          saveMessageToActiveHistory("ai", reply);
        }, 1500);
      }
    }

    // Save user's question to persistent memory
    saveMessageToActiveHistory("user", query);
  }

  function parseMarkdownTables(text) {
    const lines = text.split('\n');
    let inTable = false;
    let tableRows = [];
    let tableHeaders = null;
    let newLines = [];

    for (let i = 0; i < lines.length; i++) {
      const line = lines[i].trim();
      if (line.startsWith('|') && line.endsWith('|')) {
        const cells = line.split('|').slice(1, -1).map(c => c.trim());
        if (cells.every(c => /^:?-+:?$/.test(c))) {
          continue;
        }
        if (!inTable) {
          inTable = true;
          tableHeaders = cells;
        } else {
          tableRows.push(cells);
        }
      } else {
        if (inTable) {
          newLines.push(renderHtmlTable(tableHeaders, tableRows));
          inTable = false;
          tableRows = [];
          tableHeaders = null;
        }
        newLines.push(lines[i]);
      }
    }
    if (inTable) {
      newLines.push(renderHtmlTable(tableHeaders, tableRows));
    }
    return newLines.join('\n');
  }

  function renderHtmlTable(headers, rows) {
    let html = '<div class="table-responsive"><table class="premium-chat-table">';
    html += '<thead><tr>';
    headers.forEach(h => {
      html += `<th>${h}</th>`;
    });
    html += '</tr></thead>';
    html += '<tbody>';
    rows.forEach(row => {
      html += '<tr>';
      row.forEach(cell => {
        html += `<td>${cell}</td>`;
      });
      html += '</tr>';
    });
    html += '</tbody></table></div>';
    return html;
  }

  /**
   * Appends chats dynamically and parses markdown operators strictly.
   */
  function appendChatMessage(sender, text) {
    const feed = document.getElementById("chat-feed");
    const msgDiv = document.createElement("div");
    msgDiv.className = `chat-message ${sender}`;

    // Escape HTML tags to prevent execution
    const escapedText = escapeHtml(text);

    // Premium Markdown & Hyperlink Tokenizer Parser
    let parsedText = parseMarkdownTables(escapedText);

    // A. Format bold operators: **bold** -> <b>bold</b>
    parsedText = parsedText.replace(/\*\*(.*?)\*\*/g, '<b>$1</b>');

    // B. Hide and tokenize Markdown Links: [label](url) -> placeholder token
    let placeholders = [];
    parsedText = parsedText.replace(/\[([^\]]+)\]\(([^()\s]+(?:\([^()\s]*\)[^()\s]*)*)\)/g, (match, textLabel, url) => {
      let cleanUrl = url.trim();
      let href = cleanUrl;
      if (!/^(https?|mailto|tel):/i.test(cleanUrl)) {
        if (cleanUrl.toLowerCase().startsWith('www.')) {
          href = 'https://' + cleanUrl;
        } else if (cleanUrl.includes('@') && !cleanUrl.includes('/')) {
          href = 'mailto:' + cleanUrl;
        } else if (/^[+0-9-() ]+$/.test(cleanUrl)) {
          href = 'tel:' + cleanUrl.replace(/[^0-9+]/g, '');
        } else {
          href = 'https://' + cleanUrl;
        }
      }
      placeholders.push(`<a href="${href}" target="_blank" class="chat-link">${textLabel}</a>`);
      return `___LINK_PLACEHOLDER_${placeholders.length - 1}___`;
    });

    // C. Safely extract and format Raw URLs (ignoring placeholders)
    parsedText = parsedText.replace(/((?:https?:\/\/|www\.)[^\s<[\]{}]+)/gi, (url) => {
      let cleanUrl = url;
      let suffix = "";
      // Protect trailing sentence punctuations, quotes, and unbalanced parentheses
      while (cleanUrl.length > 0) {
        const lastChar = cleanUrl.slice(-1);
        if (/[.,;:?!'"]/.test(lastChar)) {
          suffix = lastChar + suffix;
          cleanUrl = cleanUrl.slice(0, -1);
        } else if (lastChar === ')') {
          // Only strip if unbalanced
          const openCount = (cleanUrl.match(/\(/g) || []).length;
          const closeCount = (cleanUrl.match(/\)/g) || []).length;
          if (closeCount > openCount) {
            suffix = lastChar + suffix;
            cleanUrl = cleanUrl.slice(0, -1);
          } else {
            break;
          }
        } else {
          break;
        }
      }
      let href = cleanUrl;
      if (cleanUrl.toLowerCase().startsWith('www.')) {
        href = 'https://' + cleanUrl;
      }
      return `<a href="${href}" target="_blank" class="chat-link">${cleanUrl}</a>${suffix}`;
    });

    // D. Restore tokenized Markdown Links in-place
    parsedText = parsedText.replace(/___LINK_PLACEHOLDER_(\d+)___/g, (match, index) => {
      return placeholders[parseInt(index)];
    });

    // E. Convert newlines to HTML breaks
    parsedText = parsedText.replace(/\n/g, '<br>');

    const senderLabel = sender === 'user' ? 'YO:' : 'EL PATRÓN:';

    if (sender === 'ai') {
      msgDiv.innerHTML = `
        <div style="display: flex; justify-content: space-between; align-items: center; width: 100%;">
          <span class="message-meta font-outfit">${senderLabel}</span>
          <button class="btn-tts-speak glassmorphic" onclick="speakMessage(this)" 
            onmouseenter="this.style.background='rgba(255,255,255,0.05)'; this.style.color='var(--primary)';" 
            onmouseleave="if(!this.classList.contains('speaking')) { this.style.background='transparent'; this.style.color='var(--text-muted)'; } else { this.style.background='rgba(255,255,255,0.05)'; }"
            style="background: transparent; border: none; color: var(--text-muted); cursor: pointer; display: flex; align-items: center; padding: 4px; border-radius: 50%; margin-left: 8px; transition: all 0.2s;" title="Listen to response">
            <span class="material-icons-round" style="font-size: 16px;">volume_up</span>
          </button>
        </div>
        <div class="message-bubble font-inter">${parsedText}</div>
      `;
    } else {
      msgDiv.innerHTML = `
        <span class="message-meta font-outfit">${senderLabel}</span>
        <div class="message-bubble font-inter">${parsedText}</div>
      `;
    }

    feed.appendChild(msgDiv);
    scrollToBottom();
  }

  // TEXT-TO-SPEECH (TTS) NATIVE CONTROLLER WITH HIGH-FIDELITY VOICE SELECTOR
  let currentUtterance = null;

  function selectVoice(lang) {
    if (typeof window === 'undefined' || !window.speechSynthesis) return null;
    const voices = window.speechSynthesis.getVoices();
    if (!voices || voices.length === 0) return null;

    const matching = voices.filter(v => v.lang.toLowerCase().startsWith(lang.toLowerCase()));
    if (matching.length === 0) return null;

    // Prioritize natural neural/Google/Apple/Microsoft premium voices
    const priorityKeywords = ["natural", "google", "premium", "microsoft", "apple"];
    for (const keyword of priorityKeywords) {
      const match = matching.find(v => v.name.toLowerCase().includes(keyword));
      if (match) return match;
    }

    return matching[0];
  }

  function speakMessage(btn) {
    if (window.speechSynthesis.speaking) {
      window.speechSynthesis.cancel();
      if (btn.classList.contains("speaking")) {
        resetTtsButtons();
        return;
      }
    }

    resetTtsButtons();

    const messageContainer = btn.closest(".chat-message");
    const bubble = messageContainer ? messageContainer.querySelector(".message-bubble") : null;
    if (!bubble) return;

    const rawText = bubble.innerText || bubble.textContent;
    const cleanText = rawText.replace(/___LINK_PLACEHOLDER_\d+___/g, "").trim();

    if (!cleanText) return;

    const utterance = new SpeechSynthesisUtterance(cleanText);
    const targetLang = currentLanguage === 'es' ? 'es' : 'en';
    utterance.lang = currentLanguage === 'es' ? 'es-US' : 'en-US';

    const bestVoice = selectVoice(targetLang);
    if (bestVoice) {
      utterance.voice = bestVoice;
      console.log(`TTS Voice Assigned: ${bestVoice.name} (${bestVoice.lang})`);
    }
    
    btn.classList.add("speaking");
    const icon = btn.querySelector(".material-icons-round");
    if (icon) {
      icon.innerText = "volume_off";
      icon.style.color = "var(--primary)";
      icon.style.filter = "drop-shadow(0 0 4px var(--primary))";
      btn.style.background = 'rgba(255,255,255,0.05)';
    }

    utterance.onend = () => {
      btn.classList.remove("speaking");
      if (icon) {
        icon.innerText = "volume_up";
        icon.style.color = "";
        icon.style.filter = "";
        btn.style.background = 'transparent';
      }
    };

    utterance.onerror = () => {
      btn.classList.remove("speaking");
      if (icon) {
        icon.innerText = "volume_up";
        icon.style.color = "";
        icon.style.filter = "";
        btn.style.background = 'transparent';
      }
    };

    currentUtterance = utterance;
    window.speechSynthesis.speak(utterance);
  }

  function renderHistorySidebar() {
    const container = document.getElementById("history-container");
    container.innerHTML = "";

    if (conversations.length === 0) {
      container.innerHTML = `<div class="history-empty">${i18n[currentLanguage].sidebarNoActiveConversations}</div>`;
      return;
    }

    // Prioritize pinned conversations to the top, then sort by timestamp descending
    const sorted = [...conversations].sort((a, b) => {
      if (a.pinned && !b.pinned) return -1;
      if (!a.pinned && b.pinned) return 1;
      return b.timestamp - a.timestamp;
    });

    sorted.forEach(chat => {
      const item = document.createElement("div");
      item.className = `history-item ${chat.id === activeChatId ? 'active' : ''}`;
      item.dataset.chatId = chat.id;

      // Custom context bindings (Right-Click desktop, Long-press touch mobile)
      item.addEventListener('contextmenu', (e) => triggerContextMenu(e, chat.id));

      // Handle double-tap/long-press on mobile
      let touchTimer;
      item.addEventListener('touchstart', (e) => {
        touchTimer = setTimeout(() => triggerContextMenu(e, chat.id), 600);
      });
      item.addEventListener('touchend', () => clearTimeout(touchTimer));

      item.onclick = (e) => {
        if (e.target.closest('.btn-item-options')) return;
        activateConversation(chat.id);
      };

      item.innerHTML = `
      <div class="history-item-left">
        <span class="material-icons-round ${chat.pinned ? 'icon-gold' : ''}">
          ${chat.pinned ? 'push_pin' : 'chat_bubble_outline'}
        </span>
        <span class="history-item-title font-inter">${escapeHtml(chat.title)}</span>
      </div>
      <button class="btn-item-options" onclick="triggerContextMenuAtButton(event, '${chat.id}')">
        <span class="material-icons-round">more_vert</span>
      </button>
    `;

      container.appendChild(item);
    });
  }

      const sidebar = document.querySelector(".sidebar");

  /**
   * Promise-based custom glassmorphic dialog system (Replaces native prompt/confirm)
   */
  function showCustomDialog(title, message, isPrompt = false, defaultValue = "", showCancel = true) {
    try {
      // If it's an error dialog, append a random Puerto Rican slang word (v23)
      const isError = /error|fail|denied|invalid/i.test(title) || (message && /error|fail|denied|invalid/i.test(message));
      if (isError && message) {
        const slang = getSlangSuffix();
        if (!message.includes("Puñueta") && !message.includes("Coño") && !message.includes("Carajo")) {
          message = message.trim();
          if (message.endsWith(".") || message.endsWith("!")) {
            message = message.substring(0, message.length - 1);
          }
          message += `, ${slang}!`;
        }
      }

      return new Promise((resolve) => {
        try {
          const modal = document.getElementById("custom-dialog-modal");
          const titleEl = document.getElementById("custom-dialog-title");
          const messageEl = document.getElementById("custom-dialog-message");
          const inputContainer = document.getElementById("custom-dialog-input-container");
          const inputEl = document.getElementById("custom-dialog-input");
          const btnCancel = document.getElementById("custom-dialog-btn-cancel");
          const btnConfirm = document.getElementById("custom-dialog-btn-confirm");

          if (!modal || !titleEl || !messageEl || !btnConfirm) {
            console.error("Dialog elements missing in DOM.");
            resolve(isPrompt ? null : false);
            return;
          }

          titleEl.innerText = title || "";
          messageEl.innerText = message || "";

          const isSpanish = (currentLanguage === "es");
          if (btnCancel) {
            btnCancel.innerText = isSpanish ? "Cancelar" : "Cancel";
          }
          btnConfirm.innerText = isSpanish ? "Confirmar" : "Confirm";

          if (showCancel && btnCancel) {
            btnCancel.style.display = "";
          } else if (btnCancel) {
            btnCancel.style.display = "none";
            btnConfirm.innerText = isSpanish ? "OK" : "OK";
          }

          if (isPrompt && inputContainer && inputEl) {
            inputContainer.style.display = "block";
            inputEl.value = defaultValue;
            setTimeout(() => inputEl.focus(), 100);
          } else if (inputContainer) {
            inputContainer.style.display = "none";
          }

          modal.classList.add("active");

          const handleKeydown = (e) => {
            if (e.key === "Enter") {
              e.preventDefault();
              e.stopPropagation();
              cleanup();
              resolve(isPrompt ? (inputEl ? inputEl.value : "") : true);
            } else if (e.key === "Escape") {
              e.preventDefault();
              e.stopPropagation();
              cleanup();
              resolve(isPrompt ? null : false);
            }
          };

          const handleConfirm = () => {
            cleanup();
            resolve(isPrompt ? (inputEl ? inputEl.value : "") : true);
          };

          const handleCancel = () => {
            cleanup();
            resolve(isPrompt ? null : false);
          };

          const cleanup = () => {
            modal.classList.remove("active");
            btnConfirm.removeEventListener("click", handleConfirm);
            if (btnCancel) btnCancel.removeEventListener("click", handleCancel);
            document.removeEventListener("keydown", handleKeydown);
          };

          btnConfirm.addEventListener("click", handleConfirm);
          if (btnCancel) btnCancel.addEventListener("click", handleCancel);
          document.addEventListener("keydown", handleKeydown);
        } catch (innerErr) {
          console.error("Promise setup error in showCustomDialog:", innerErr);
          resolve(isPrompt ? null : false);
        }
      });
    } catch (outerErr) {
      console.error("Outer error in showCustomDialog:", outerErr);
      return Promise.resolve(isPrompt ? null : false);
    }
  }

  function contextActionDelete() {
    try {
      if (!targetContextNodeId) {
        console.warn("contextActionDelete: targetContextNodeId is null or undefined.");
        showToast(currentLanguage === 'es' ? "Error: No se identificó la conversación." : "Error: Conversation could not be identified.", "error");
        return;
      }

      const chatIndex = conversations.findIndex(c => c.id === targetContextNodeId);
      if (chatIndex === -1) {
        console.warn("contextActionDelete: Conversation ID not found in memory: " + targetContextNodeId);
        showToast(currentLanguage === 'es' ? "Error: Conversación no encontrada en el historial." : "Error: Conversation not found in history list.", "error");
        closeContextMenu();
        return;
      }

      const confirmTitle = currentLanguage === 'es' ? "Eliminar Conversación" : "Delete Conversation";
      const confirmMsg = currentLanguage === 'es' ? "¿Está seguro de eliminar permanentemente esta conversación?" : "Are you sure you want to permanently delete this conversation?";
      
      showCustomDialog(confirmTitle, confirmMsg, false).then(confirmed => {
        try {
          if (confirmed) {
            const index = conversations.findIndex(c => c.id === targetContextNodeId);
            if (index !== -1) {
              conversations.splice(index, 1);
              saveConversationsToStore();

              // If deleted active chat, fallback selection
              if (activeChatId === targetContextNodeId) {
                activeChatId = conversations.length > 0 ? conversations[0].id : null;
              }

              if (activeChatId) {
                activateConversation(activeChatId);
              } else {
                createNewChat();
              }
              showToast(currentLanguage === 'es' ? "Conversación eliminada con éxito." : "Conversation deleted successfully.", "success");
            } else {
              showToast(currentLanguage === 'es' ? "Error: La conversación ya no existe." : "Error: Conversation no longer exists.", "error");
            }
          }
        } catch (innerErr) {
          console.error("Error inside contextActionDelete confirmation:", innerErr);
          showToast("Error processing deletion: " + innerErr.toString(), "error");
        }
      });
    } catch (err) {
      console.error("Error in contextActionDelete:", err);
      showToast("Delete operation failed: " + err.toString(), "error");

  // 7. PUERTO RICAN VOICE SPEECH ENGINE
  function setupSpeechEngine() {
    try {
      const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
      if (!SpeechRecognition) {
        console.log("Speech recognition not supported on this device browser runtime.");
        return;
      }

      recognition = new SpeechRecognition();
      recognition.continuous = false;
      recognition.interimResults = false;
      recognition.lang = "es-PR"; // Custom configured for Puerto Rican Spanish!

      recognition.onstart = () => {
        isRecording = true;
        const textPrompt = document.getElementById("chat-input");
        window.preRecordText = textPrompt ? textPrompt.value.trim() : "";
        const mic = document.getElementById("btn-voice-mic");
        const micIcon = document.getElementById("voice-mic-icon");
        if (mic) mic.classList.add("recording");
        if (micIcon) micIcon.innerText = "settings_voice";
      };

      recognition.onresult = (event) => {
        let finalTranscript = "";
        for (let i = 0; i < event.results.length; ++i) {
          if (event.results[i].isFinal) {
            finalTranscript += event.results[i][0].transcript;
          }
        }
        const textPrompt = document.getElementById("chat-input");
        if (textPrompt) {
          const prefix = window.preRecordText || "";
          textPrompt.value = prefix + (prefix ? " " : "") + finalTranscript;
        }
      };

      recognition.onerror = (e) => {
        console.error("Speech Recognition Error: ", e);
        let errorMsg = "Speech recognition error.";
        if (e.error === 'not-allowed') {
          errorMsg = currentLanguage === 'es' 
            ? "Acceso al micrófono denegado. Nota: en Google Apps Script, el navegador bloquea el micrófono dentro de iframes sandboxed." 
            : "Microphone access denied. Note: in Google Apps Script, browsers block microphone access inside sandboxed iframes.";
        } else if (e.error === 'no-speech') {
          errorMsg = currentLanguage === 'es' ? "No se detectó voz. Habla más claro, carajo." : "No speech detected. Speak clearly.";
        } else {
          errorMsg = `Speech error: ${e.error}`;
        }
        showToast(errorMsg, "error");
        stopRecordingUI();
      };

      recognition.onend = () => {
        stopRecordingUI();
      };

      // Set up message receiver for secure Cloudflare Worker voice bridge popups
      if (!window.hasSpeechMessageListener) {
        window.addEventListener('message', (event) => {
          const workerUrl = getNetworkSetting("worker_url");
          if (workerUrl && !workerUrl.includes(event.origin)) {
            return;
          }
          if (event.data && event.data.type === 'speech-result') {
            const transcript = event.data.transcript;
            const textPrompt = document.getElementById("chat-input");
            if (textPrompt && transcript) {
              textPrompt.value += (textPrompt.value ? " " : "") + transcript;
            }
            stopRecordingUI();
          } else if (event.data && event.data.type === 'speech-error') {
            showToast(event.data.error, "error");
            stopRecordingUI();
          } else if (event.data && event.data.type === 'speech-close') {
            stopRecordingUI();
          }
        });
        window.hasSpeechMessageListener = true;
      }
    } catch (err) {
      console.warn("Speech recognition initialization blocked by security or sandboxing:", err);
      recognition = null;
    }
  }

  function toggleVoiceSpeech() {
    // Detect if running inside Google Apps Script iframe environment
    const isGAS = window.location.hostname.includes('googleusercontent.com') || window.location.hostname.includes('script.google.com') || window.location.hostname.includes('google.com');
    if (isGAS) {
      const workerUrl = getNetworkSetting("worker_url");
      if (!workerUrl) {
        showToast(
          currentLanguage === 'es'
            ? "Acceso al micrófono bloqueado en Google Apps Script. Configure su URL de Cloudflare Worker en Network & API Properties para activar la voz, carajo."
            : "Microphone access denied in Google Apps Script. Configure your Cloudflare Worker URL in Network & API Properties to enable voice input.",
          "error"
        );
        return;
      }

      if (isRecording) {
        return;
      }

      // Visual UI Feedback
      isRecording = true;
      const mic = document.getElementById("btn-voice-mic");
      const micIcon = document.getElementById("voice-mic-icon");
      if (mic) mic.classList.add("recording");
      if (micIcon) micIcon.innerText = "settings_voice";

      const cleanWorkerUrl = workerUrl.trim().replace(/\/$/, "");
      const targetLang = currentLanguage === 'es' ? 'es-PR' : 'en-US';
      const speechUrl = `${cleanWorkerUrl}/speech?lang=${targetLang}`;

      // Open centered popup
      const width = 460;
      const height = 400;
      const left = (window.screen.width / 2) - (width / 2);
      const top = (window.screen.height / 2) - (height / 2);

      const voicePopup = window.open(
        speechUrl,
        "ElPatronVoicePopup",
        `width=${width},height=${height},top=${top},left=${left},status=no,menubar=no,toolbar=no,location=no,resizable=no`
      );

      if (!voicePopup) {
        showToast(
          currentLanguage === 'es'
            ? "Popup bloqueado. Por favor permita ventanas emergentes para usar la voz."
            : "Popup blocked. Please enable popups for this site to use voice recognition.",
          "error"
        );
        stopRecordingUI();
        return;
      }

      const checkClosedInterval = setInterval(() => {
        if (voicePopup.closed) {
          clearInterval(checkClosedInterval);
          stopRecordingUI();
        }
      }, 1000);

      return;
    }

    if (!recognition) {
      setupSpeechEngine();
      if (!recognition) {
        showToast(currentLanguage === 'es' ? "Reconocimiento de voz no soportado en este navegador. En iOS/Safari, use el botón de micrófono nativo de su teclado." : "Speech recognition is not supported in this browser. On iOS/Safari, please try using your keyboard's native dictation button.", "error");
        return;
      }
    }

    if (isRecording) {
      recognition.stop();
    } else {
      try {
        // Start speech recognition engine directly. Chrome handles permission requests.
        recognition.lang = currentLanguage === "es" ? "es-PR" : "en-US";
        recognition.start();
      } catch (err) {
        console.error("Speech recognition start failed:", err);
        showToast(currentLanguage === 'es' ? "Error al iniciar micrófono." : "Failed to start microphone.", "error");
      }
    }
  }

  function stopRecordingUI() {

    const mic = document.getElementById("btn-voice-mic");
    const micIcon = document.getElementById("voice-mic-icon");
    mic.classList.remove("recording");
    micIcon.innerText = "mic";
  }

  // 8. UTILITIES & DATA EXPORT CHANNELS
  function showToast(message, type = "success") {
    // Append a random Puerto Rican slang suffix to error toasts (v23)
    if (type === "error") {
      const slang = getSlangSuffix();
      if (!message.includes("Puñueta") && !message.includes("Coño") && !message.includes("Carajo")) {
        message = message.trim();
        if (message.endsWith(".") || message.endsWith("!")) {
          message = message.substring(0, message.length - 1);
        }
        message += `, ${slang}!`;
      }
    }

    const container = document.getElementById("toast-container");
    if (!container) return;

    const toast = document.createElement("div");
    toast.className = `toast glassmorphic`;

    let iconName = "info";
    if (type === "success") {
      iconName = "check_circle";
    } else if (type === "error") {
      iconName = "error";
    } else if (type === "warning") {
      iconName = "warning";
    }

    toast.innerHTML = `
    <span class="material-icons-round toast-icon ${type}">${iconName}</span>
    <span class="toast-message">${message}</span>
  `;

    container.appendChild(toast);

    // Trigger animation after append
    setTimeout(() => {
      toast.classList.add("show");
    }, 50);

    // Auto remove toast
    setTimeout(() => {
      toast.classList.remove("show");
      setTimeout(() => {
        toast.remove();
      }, 400);
    }, 4000);
  }

  function copyThreadToClipboard() {
    const chat = conversations.find(c => c.id === activeChatId);
    if (!chat || chat.messages.length === 0) return;

    let clipText = `El Patrón (Tradición AI) OS v14.2 — Registro del Hilo: ${chat.title}\n`;
    clipText += `==============================================\n\n`;

    chat.messages.forEach(msg => {
      const label = msg.sender === 'user' ? 'YO' : 'EL PATRÓN';
      clipText += `${label}: ${msg.text}\n\n`;
    });

    navigator.clipboard.writeText(clipText)
      .then(() => {
        showToast(currentLanguage === 'es' ? "Hilo copiado al portapapeles con éxito." : "Thread copied to clipboard successfully.", "success");
      })
      .catch(err => {
        console.error("Clipboard Copy Error: ", err);
      });

  function downloadThreadAsTxt() {
    const chat = conversations.find(c => c.id === activeChatId);
    if (!chat || chat.messages.length === 0) return;

    let fileText = `El Patrón (Tradición AI) OS v14.2 — Registro del Hilo: ${chat.title}\n`;
    fileText += `Fecha de exportación: ${new Date().toLocaleString()}\n`;
    fileText += `==============================================\n\n`;

    chat.messages.forEach(msg => {
      const label = msg.sender === 'user' ? 'YO' : 'EL PATRÓN';
      fileText += `${label}: ${msg.text}\n\n`;
    });

    const blob = new Blob([fileText], { type: 'text/plain;charset=utf-8' });
    const url = URL.createObjectURL(blob);

    const a = document.createElement("a");
    a.href = url;
    a.download = "El_Patron_Chat.txt";
    document.body.appendChild(a);
    a.click();

    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  }

  function openFeedbackModal() {

  function submitFeedback() {
    const feedbackVal = document.getElementById("feedback-text").value.trim();
    if (!feedbackVal) {
      showCustomDialog("Validation Error", "Please write something before submitting, carajo!");
      return;
    }

    const email = safeGetItem("email_auth") || document.getElementById("login-email").value;
    const pin = safeGetItem("pin_auth") || document.getElementById("login-pin").value;

    const btn = document.getElementById("btn-submit-feedback");
    btn.disabled = true;
    btn.innerText = "Submitting...";

    const isHybrid = document.getElementById("architecture-toggle").classList.contains("active");

    if (isHybrid) {
      // Hybrid Mode (POST fetch to Cloudflare Worker Router)
      const workerUrl = getNetworkSetting("worker_url");
      const appsScriptUrl = getNetworkSetting("gas_url");
      const geminiKey = getNetworkSetting("gemini_key");

      fetch(workerUrl, {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "X-Apps-Script-Url": appsScriptUrl,
          "X-Gemini-Key": geminiKey

  function handleFeedbackStatusChange(rowIndex, selectEl) {
    const newStatus = selectEl.value;

    // Instantly update local class for beautiful live neon glow styling transition
    selectEl.className = `status-select ${newStatus.toLowerCase()}`;

    const email = sessionUser.email;
    const pin = getPINAuth();

      const geminiKey = getNetworkSetting("gemini_key");

          query: "Update feedback status action"
        })
      })
        .then(res => res.json())
        .then(data => {
          if (data.success) {
            showToast(`Feedback updated to ${newStatus}!`, "success");

            const item = activeFeedbackList.find(r => r.rowIndex === rowIndex);
            if (item) item.status = newStatus;
            updateFeedbackAdminStats();
            updateFeedbackCounter();
          } else {
            showCustomDialog("Update Error", data.error || "An error occurred.");
          }
        })
        .catch(err => showCustomDialog("Update Failed", "Could not connect to Edge router: " + err.toString()));
    } else {
      if (typeof google !== 'undefined' && google.script && google.script.run) {
        google.script.run
          .withSuccessHandler(function (data) {
            if (data && data.success) {
              showToast(`Feedback updated to ${newStatus}!`, "success");

              if (item) item.status = newStatus;

              updateFeedbackCounter();

              showCustomDialog("Update Error", data.error || "An error occurred.");

          })

  function handleInventoryStatusChange(rowIndex, selectEl) {
    const newStatus = selectEl.value;
    selectEl.className = `status-select ${newStatus.toLowerCase()}`;

    const email = sessionUser.email;
    const pin = getPINAuth();
    const isHybrid = document.getElementById("architecture-toggle").classList.contains("active");

    showToast(`Updating inventory status to ${newStatus}...`, "info");

    const item = activeInventoryList.find(r => r.rowIndex === rowIndex);
    const comments = item ? item.comments : "";

    if (isHybrid) {
      const workerUrl = getNetworkSetting("worker_url");
      const appsScriptUrl = getNetworkSetting("gas_url");
      const geminiKey = getNetworkSetting("gemini_key");

      fetch(workerUrl, {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "X-Apps-Script-Url": appsScriptUrl,
          "X-Gemini-Key": geminiKey
        },
        body: JSON.stringify({
          email: email,
          pin: pin,
          action: "updateInventoryStatus",
          rowIndex: rowIndex,
          newStatus: newStatus,
          comments: comments,
          query: "Update inventory status action"
        })
      })
        .then(res => res.json())
        .then(data => {
          if (data.success) {
            showToast("Inventory status updated successfully!", "success");
            if (item) item.status = newStatus;
            updateInventoryAdminStats();
            updateInventoryCounter();
          } else {
            showCustomDialog("Update Error", data.error || "Failed to update status.");
          }
        })
        .catch(err => showCustomDialog("Update Failed", err.toString()));
    } else {
      if (typeof google !== 'undefined' && google.script && google.script.run) {
        google.script.run
          .withSuccessHandler(function (data) {
            if (data && data.success) {
              showToast("Inventory status updated successfully!", "success");
              if (item) item.status = newStatus;
              updateInventoryAdminStats();
              updateInventoryCounter();
            } else {
              showCustomDialog("Update Error", data.error || "Failed to update status.");
            }
          })
          .withFailureHandler(function (err) {
            showCustomDialog("Execution Error", err.toString());
          })

        saveLocalMockInventoryList(activeInventoryList);
        showToast("Status updated in offline mock db!", "success");
        updateInventoryAdminStats();
        updateInventoryCounter();
      }
    }
  }

  function populateChecklistTypeFilter() {
    const filterEl = document.getElementById("checklistTypeFilter");
    if (!filterEl) return;
    
    const dict = i18n[currentLanguage];
    const currentVal = filterEl.value || "all";
    filterEl.innerHTML = `<option value="all">${dict.allTypes || "🔍 All Types"}</option>`;
    
    const types = new Set();
    checklistItems.forEach(item => {
      if (item && item.type) {
        const trimmed = item.type.trim();
        if (trimmed) types.add(trimmed);
      }
    });
    
    Array.from(types).sort().forEach(type => {
      const opt = document.createElement("option");
      opt.value = type;
      opt.textContent = type;
      filterEl.appendChild(opt);
    });
    
    if (types.has(currentVal)) {
      filterEl.value = currentVal;
    } else {
      filterEl.value = "all";
    }
  }

        `;
      }

      const isAdminUser = sessionUser.email === "rodriguez2113@gmail.com" || sessionUser.email === "darienl140@gmail.com" || sessionUser.clearance === "director";

      card.innerHTML = `
        <div class="item-image-box" onclick="openZoomLightbox('${convertedImgUrl}', '${escapeHtml(item.description)}')">
          ${imageHtml}
          <span class="id-tag">ID: ${item.id || 'N/A'}</span>
          <span class="cost-tag">${dict.lblChecklistCost} $${item.cost || 'N/A'}</span>
        </div>
        <div class="item-content">
          <div class="item-info">
            <h3 class="item-title">${item.description}</h3>
            <div class="item-meta-badges">
              <span class="meta-badge">ID: ${item.id || 'N/A'}</span>
              <span class="meta-badge badge-gold">${dict.lblChecklistCost} $${item.cost || 'N/A'}</span>
              <span class="meta-badge badge-type">${dict.lblChecklistType} ${item.type || 'General'}</span>
              ${isAdminUser ? `<span class="meta-badge" style="color: #3b82f6; border-color: rgba(59, 130, 246, 0.25);">${dict.assignedLabel || "Assigned:"} ${item.assigned || 'Unassigned'}</span>` : ''}
            </div>
          </div>
          
          <div class="status-group">
            <div style="display:flex; justify-content:space-between; align-items:center;">
              <label class="status-label">${dict.lblChecklistStatus}</label>
              <span id="checklist-sync-${item.rowIndex}" class="sync-status">
                <span class="spinner" style="display:none; width:10px; height:10px; border-width:1.5px; margin-right: 3px;"></span>
                <span>${dict.checklistSaved || "Saved"}</span>
              </span>
            </div>
            <div class="status-select-wrapper">
              <select class="status-select ${selectClass}" id="checklist-status-${item.rowIndex}" onchange="saveCostumeField(${item.rowIndex}, '${item.id}', 'status')">
                <option value="-" ${item.status === '-' || isUnset ? 'selected' : ''}>${dict.statusNotSet}</option>
                <option value="Yes. I got it" ${item.status === 'Yes. I got it' ? 'selected' : ''}>${dict.statusYes}</option>
                <option value="I returned it" ${item.status === 'I returned it' ? 'selected' : ''}>${dict.statusReturned}</option>
                <option value="I never received it." ${item.status === 'I never received it.' ? 'selected' : ''}>${dict.statusNever}</option>
                <option value="I lost it and need to replace it" ${item.status === 'I lost it and need to replace it' ? 'selected' : ''}>${dict.statusLost}</option>
                <option value="I loaned it to another performer (See Notes)" ${item.status === 'I loaned it to another performer (See Notes)' ? 'selected' : ''}>${dict.statusLoaned}</option>
                <option value="I damaged it and need to replace it" ${item.status === 'I damaged it and need to replace it' ? 'selected' : ''}>${dict.statusDamaged}</option>
                <option value="I cannot read the label ID." ${item.status === 'I cannot read the label ID.' ? 'selected' : ''}>${dict.statusUnread}</option>
                <option value="Yes I have one with a diferent number. See &quot;PERFORMER NOTES&quot; NOTES" ${item.status === 'Yes I have one with a diferent number. See "PERFORMER NOTES" NOTES' ? 'selected' : ''}>${dict.statusDifferentNumber}</option>
                <option value="Yes, I have the item with a different number. (See Performer Notes)" ${item.status === 'Yes, I have the item with a different number. (See Performer Notes)' ? 'selected' : ''}>${dict.statusDifferentNumberNew}</option>
              </select>
            </div>
          </div>

          <div class="notes-group">
            <label class="notes-label">
              <span>${dict.lblChecklistNotes}</span>
            </label>
            <textarea class="notes-textarea" id="checklist-notes-${item.rowIndex}" placeholder="${dict.notesPlaceholder}" oninput="debounceChecklistSave(${item.rowIndex}, '${item.id}')" onblur="blurChecklistSave(${item.rowIndex}, '${item.id}')">${item.notes || ''}</textarea>
          </div>
        </div>
      `;
      grid.appendChild(card);
    });
    
    // Force layout style class
    changeChecklistLayout();
  }

  function updateChecklistStats(itemsList) {
    const total = itemsList.length;
    let confirmed = 0;
    
    itemsList.forEach(item => {
      if (item && item.status && item.status.trim() !== "" && item.status.trim() !== "-") {
        confirmed++;
      }
    });
    
    document.getElementById("checklist-stat-total").textContent = total;
    document.getElementById("checklist-stat-confirmed").textContent = confirmed;
    document.getElementById("checklist-stat-pending").textContent = total - confirmed;
  }

  function handleChecklistImageError(img) {
    const container = img.parentElement;
    container.innerHTML = `
      <div class="item-img-placeholder">
        <span class="material-icons-round" style="color:var(--accent-crimson);">error_outline</span>
        <span style="font-size:10px;">Error loading image</span>
      </div>
    `;
  }

  function changeChecklistLayout() {
    const select = document.getElementById("checklistLayoutSelect");
    const grid = document.getElementById("costume-checklist-grid");
    if (!select || !grid) return;
    
    const layout = select.value;
    grid.className = "item-grid"; // reset
    grid.classList.add(layout);
  }

  function onChecklistPerformerChanged() {
    const select = document.getElementById("checklistPerformerSelect");
    if (!select) return;
    
    checklistSelectedPerformer = select.value;
    
    const grid = document.getElementById("costume-checklist-grid");
    const dict = i18n[currentLanguage];
    grid.innerHTML = `<div style="text-align: center; color: var(--text-muted); padding: 40px; width: 100%;" id="checklist-loading-msg">${dict.checklistLoading || "Loading checklist items..."}</div>`;
    
    fetchCostumeChecklist();
  }

  function saveCostumeField(rowIndex, expectedId, triggerField) {
    const selectEl = document.getElementById(`checklist-status-${rowIndex}`);
    const notesEl = document.getElementById(`checklist-notes-${rowIndex}`);
    const statusIndicator = document.getElementById(`checklist-sync-${rowIndex}`);
    
    const newStatus = selectEl.value;
    const notesText = notesEl.value;
    const dict = i18n[currentLanguage];

    // Reset and assign dropdown borders based on state value
    selectEl.className = "status-select"; // reset
    if (newStatus === "Yes. I got it") selectEl.classList.add("val-yes");
    else if (newStatus === "I returned it") selectEl.classList.add("val-returned");
    else if (newStatus === "I never received it.") selectEl.classList.add("val-never");
    else if (newStatus === "I lost it and need to replace it") selectEl.classList.add("val-lost");
    else if (newStatus === "I loaned it to another performer (See Notes)") selectEl.classList.add("val-loaned");
    else if (newStatus === "I damaged it and need to replace it") selectEl.classList.add("val-damaged");
    else if (newStatus === "I cannot read the label ID.") selectEl.classList.add("val-unread");
    else if (newStatus === "Yes I have one with a diferent number. See \"PERFORMER NOTES\" NOTES" || newStatus === "Yes, I have the item with a different number. (See Performer Notes)") selectEl.classList.add("val-different");
    else selectEl.classList.add("val-unset");

    // Display saving spinner
    statusIndicator.className = "sync-status active saving";
    statusIndicator.querySelector('span:last-child').textContent = dict.checklistSaving || "Saving...";
    statusIndicator.querySelector('.spinner').style.display = "inline-block";

    const email = sessionUser.email;
    const pin = getPINAuth();
    const isHybrid = document.getElementById("architecture-toggle").classList.contains("active");

    const requestPayload = {
      email: email,
      pin: pin,
      action: "saveInventoryField",
      rowIndex: rowIndex,
      expectedId: expectedId,
      newStatus: newStatus,
      performerNotes: notesText,
      query: "Save checklist cell"
    };

    const handleSuccess = (response) => {
      if (response && response.success) {
        statusIndicator.className = "sync-status active";
        statusIndicator.querySelector('span:last-child').innerHTML = "&#x2713; " + (dict.checklistSaved || "Saved");
        statusIndicator.querySelector('.spinner').style.display = "none";
        
        // Update local memory state cache
        const index = checklistItems.findIndex(item => item.rowIndex === rowIndex);
        if (index !== -1) {
          checklistItems[index].status = newStatus;
          checklistItems[index].notes = notesText;
          if (response.resolvedRowIndex && response.resolvedRowIndex !== rowIndex) {
            checklistItems[index].rowIndex = response.resolvedRowIndex;
          }
        }
        
        // Re-run stats counters
        updateChecklistStats(checklistItems);

        setTimeout(() => {
          if (statusIndicator.classList.contains('active') && !statusIndicator.classList.contains('saving')) {
            statusIndicator.classList.remove('active');
          }
        }, 2000);
      } else {
        handleFailure(response ? response.error : "Unknown save error.");
      }
    };

    const handleFailure = (err) => {
      statusIndicator.className = "sync-status active error";
      statusIndicator.querySelector('span:last-child').textContent = dict.checklistError || "Save error";
      statusIndicator.querySelector('.spinner').style.display = "none";
      showToast((dict.toastSaveError || "Error saving: ") + err, "error");
    };

    if (isHybrid) {
      const workerUrl = getNetworkSetting("worker_url");
      const appsScriptUrl = getNetworkSetting("gas_url");
      const geminiKey = getNetworkSetting("gemini_key");

      fetch(workerUrl, {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "X-Apps-Script-Url": appsScriptUrl,
          "X-Gemini-Key": geminiKey
        },
        body: JSON.stringify(requestPayload)
      })
      .then(res => res.json())
      .then(handleSuccess)
      .catch(handleFailure);
    } else {
      if (typeof google !== 'undefined' && google.script && google.script.run) {
        google.script.run
          .withSuccessHandler(handleSuccess)
          .withFailureHandler(handleFailure)
          .directSaveInventoryField(email, pin, rowIndex, expectedId, newStatus, notesText);
      } else {
        // Offline mock save
        setTimeout(() => {
          handleSuccess({ success: true });
        }, 1000);
      }
    }
  }

  function debounceChecklistSave(rowIndex, itemId) {
    const statusIndicator = document.getElementById(`checklist-sync-${rowIndex}`);
    const dict = i18n[currentLanguage];
    statusIndicator.className = "sync-status active saving";
    statusIndicator.querySelector('span:last-child').textContent = dict.typing || "Typing...";
    statusIndicator.querySelector('.spinner').style.display = "none";

    if (checklistDebounceTimers[rowIndex]) {
      clearTimeout(checklistDebounceTimers[rowIndex]);
    }

    checklistDebounceTimers[rowIndex] = setTimeout(() => {
      saveCostumeField(rowIndex, itemId, 'notes');
      delete checklistDebounceTimers[rowIndex];
    }, 1200);
  }

  function blurChecklistSave(rowIndex, itemId) {
    if (checklistDebounceTimers[rowIndex]) {
      clearTimeout(checklistDebounceTimers[rowIndex]);
      delete checklistDebounceTimers[rowIndex];
      saveCostumeField(rowIndex, itemId, 'notes');
    }
  }

  function openZoomLightbox(src, description) {
    if (!src) return;
    const lightbox = document.getElementById("zoom-lightbox-modal");
    const img = document.getElementById("zoom-lightbox-image");
    
    img.src = src;
    img.alt = description;
    lightbox.classList.add("active");
  }

  function closeZoomLightbox(event) {
    if (event.target.classList.contains("lightbox-overlay") || event.target.classList.contains("lightbox-close-btn") || event.type === 'click') {
      const lightbox = document.getElementById("zoom-lightbox-modal");
      lightbox.classList.remove("active");
      setTimeout(() => {
        document.getElementById("zoom-lightbox-image").src = "";
      }, 250);
    }
  }
}
</script>
