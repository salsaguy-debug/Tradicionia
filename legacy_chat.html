<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>v16 - El Patrón Dice - Tradición AI</title>

<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">

<style>
/* ===========================
   v16 SINGLE-FILE UI STYLES
   =========================== */

:root {
  --bg:#f5f6f8;
  --card-bg:#ffffff;
  --text:#333;
  --border:#e2e8f0;
  --accent:#0284c7;
  --out-bg:#f8fafc;
}

body.dark-mode {
  --bg:#0f172a;
  --card-bg:#1e293b;
  --text:#f8fafc;
  --border:#334155;
  --accent:#38bdf8;
  --out-bg:#020617;
}

body.theme-hq { --accent:#0284c7; }
body.theme-tropical { --accent:#2e7d32; }
body.theme-salsa { --accent:#e53e3e; }

body {
  margin:0;
  font-family:'Segoe UI', Tahoma, sans-serif;
  background:var(--bg);
  color:var(--text);
  display:flex;
  height:100vh;
  overflow:hidden;
  transition:0.3s;
}

/* Sidebar */
.sidebar {
  width:260px;
  background:var(--card-bg);
  border-right:1px solid var(--border);
  display:flex;
  flex-direction:column;
  padding:20px;
  flex-shrink:0;
}

.new-chat-btn {
  padding:12px;
  border-radius:8px;
  border:1px solid var(--border);
  background:var(--card-bg);
  font-weight:bold;
  cursor:pointer;
}

.chats-list {
  flex:1;
  overflow-y:auto;
  margin-top:10px;
}

.chat-item {
  padding:12px;
  border-radius:8px;
  cursor:pointer;
  margin-bottom:5px;
  font-size:13px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  transition:0.2s;
}

.chat-item:hover { background:var(--bg); }
.chat-item.active {
  background:var(--bg);
  border-left:4px solid var(--accent);
  font-weight:bold;
}

/* Main */
.main-content {
  flex:1;
  display:flex;
  flex-direction:column;
  padding:10px 20px;
  min-width:0;
}

.header {
  display:flex;
  align-items:center;
  justify-content:center;
  gap:8px;
  margin-bottom:10px;
  flex-wrap:wrap;
}

.patron-avatar {
  width:75px;
  height:75px;
  border-radius:50%;
  border:3px solid var(--accent);
  object-fit:cover;
}

.cred-input, .ui-select, .icon-btn {
  height:40px;
  border:1px solid var(--border);
  border-radius:8px;
  background:var(--card-bg);
  color:var(--text);
  font-size:13px;
}

.cred-input { padding:0 10px; width:145px; }

#output {
  flex:1;
  background:var(--out-bg);
  border-radius:15px;
  padding:20px;
  overflow-y:auto;
  border-left:6px solid var(--accent);
  display:flex;
  flex-direction:column;
  gap:15px;
}

.user-msg {
  align-self:flex-end;
  background:var(--card-bg);
  border:1px solid var(--border);
  padding:12px 18px;
  border-radius:15px 15px 0 15px;
  color:var(--accent);
  font-weight:bold;
  max-width:80%;
}

.ai-msg {
  align-self:flex-start;
  line-height:1.6;
  width:100%;
  border-bottom:1px dashed var(--border);
  padding-bottom:10px;
}

.input-bar {
  display:flex;
  align-items:center;
  background:var(--card-bg);
  border-radius:35px;
  padding:5px 15px;
  border:1px solid var(--border);
  margin-top:15px;
  gap:5px;
}

#query {
  flex:1;
  border:none;
  background:none;
  color:var(--text);
  padding:12px;
  font-size:16px;
}

.send-btn {
  color:var(--accent);
  background:none;
  border:none;
  cursor:pointer;
}

@media (max-width:768px) {
  body { flex-direction:column; }
  .sidebar {
    width:100%;
    height:160px;
    padding:10px;
    border-bottom:1px solid var(--border);
  }
}
</style>
</head>

<body class="theme-hq">

<!-- SIDEBAR -->
<div class="sidebar">
  <div style="font-size:9px; opacity:0.5;">v16 index.html</div>
  <div id="history-label" style="font-weight:bold; color:var(--accent); margin-bottom:10px;">HISTORY</div>
  <button id="new-chat-btn" onclick="startNewChat()" class="new-chat-btn">+ New Chat</button>
  <div id="chatsList" class="chats-list"></div>
</div>

<!-- MAIN -->
<div class="main-content">

<div class="header">
  <img src="assets/patron.png" class="patron-avatar">
  <input type="email" id="email" class="cred-input" placeholder="Email">
  <input type="password" id="pin" class="cred-input" placeholder="PIN" style="width:80px;">
  <select id="langSelect" class="ui-select" onchange="updateUILanguage()">
    <option value="English">EN</option>
    <option value="Spanish" selected>ES</option>
  </select>

  <!-- ⭐ GUIDE BUTTON RESTORED -->
  <button class="icon-btn" title="Guide"
  onclick="window.open('https://docs.google.com/document/d/14vzxlAZ1fO192lApDRPgWRpAKJPox2NHp8RpNo6Rm50/edit?usp=sharing','_blank')">
      <span class="material-icons">menu_book</span>
  </button>

  <button class="icon-btn" onclick="cycleTheme()"><span class="material-icons">palette</span></button>
  <button class="icon-btn" onclick="toggleMode()"><span class="material-icons" id="modeIcon">dark_mode</span></button>
</div>

<h2 id="main-title">EL PATRÓN DICE:</h2>

<div id="output"></div>

<div class="input-bar">
  <input type="text" id="query" placeholder="Pregunta al Patrón..." onkeypress="if(event.key==='Enter') ask()">
  <button class="action-btn" onclick="copyChat()"><span class="material-icons">content_copy</span></button>
  <button class="action-btn" onclick="downloadChat()"><span class="material-icons">download</span></button>
  <button id="send-btn" onclick="ask()" class="send-btn"><span class="material-icons" style="font-size:38px;">send</span></button>
</div>

</div>

<script>
/* ===========================
   v16 SINGLE-FILE UI SCRIPT
   =========================== */

const API_URL = "https://tradicion-api.tradicion.workers.dev/api";

const $email = document.getElementById('email');
const $pin = document.getElementById('pin');
const $query = document.getElementById('query');
const $output = document.getElementById('output');
const $lang = document.getElementById('langSelect');

let currentId = null;
const storageKey = 'tradicion_v16_fortress';

function scrollToBottom() {
  $output.scrollTop = $output.scrollHeight;
}

window.onload = () => {
  render();
  startNewChat();
  updateUILanguage();
};

function updateUILanguage() {
  const lang = $lang.value;
  document.getElementById('main-title').innerText =
    lang === "Spanish" ? "EL PATRÓN DICE:" : "EL PATRÓN SAYS:";
  document.getElementById('history-label').innerText =
    lang === "Spanish" ? "HISTORIAL" : "HISTORY";
  document.getElementById('new-chat-btn').innerText =
    lang === "Spanish" ? "+ Nuevo Chat" : "+ New Chat";
  $query.placeholder =
    lang === "Spanish" ? "Pregunta al Patrón..." : "Ask El Patrón...";
}

async function ask() {
  const q = $query.value.trim();
  const e = $email.value.trim();
  const p = $pin.value.trim();
  const l = $lang.value;

  if (!e || !p) return alert("¡Coño! Enter Email and PIN first.");
  if (!q) return;

  if (!currentId) {
    currentId = Date.now().toString();
    saveChat(currentId, q.substring(0, 25));
  }

  $output.insertAdjacentHTML("beforeend",
    `<div class="user-msg">${q}</div>
     <div class="ai-msg" id="loading">...</div>`
  );

  $query.value = "";
  scrollToBottom();

  try {
    const res = await fetch(API_URL, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ query: q, email: e, pin: p, lang: l })
    });

    const json = await res.json();
    document.getElementById("loading").remove();

    if (json.data === "USER_NOT_FOUND_ERROR")
      return alert(`Email ${e} not found.`);

    if (json.data === "INVALID_PIN_ERROR")
      return alert(`PIN incorrect for ${e}.`);

    const formatted = json.data
      .replace(/\n/g, "<br>")
      .replace(/\*\*(.*?)\*\*/g, "<b>$1</b>");

    $output.insertAdjacentHTML("beforeend",
      `<div class="ai-msg">${formatted}</div>`
    );

    updateMsgs(currentId, q, json.data);
  } catch {
    if (document.getElementById("loading"))
      document.getElementById("loading").remove();
    alert("Connection error. Check deployment.");
  }

  scrollToBottom();
}

function saveChat(id, title) {
  let chats = JSON.parse(localStorage.getItem(storageKey) || '[]');
  chats.unshift({ id, title, msgs: [], pinned: false });
  localStorage.setItem(storageKey, JSON.stringify(chats));
  render();
}

function updateMsgs(id, q, a) {
  let chats = JSON.parse(localStorage.getItem(storageKey));
  let c = chats.find(x => x.id === id);
  if (c) {
    c.msgs.push({ q, a });
    localStorage.setItem(storageKey, JSON.stringify(chats));
  }
}

function render() {
  const chats = JSON.parse(localStorage.getItem(storageKey) || '[]');
  document.getElementById('chatsList').innerHTML = chats
    .map(c => `
      <div class="chat-item ${c.id === currentId ? 'active' : ''}"
           onclick="loadChat('${c.id}')">
        <span>${c.pinned ? '📌 ' : ''}${c.title}</span>
      </div>
    `).join('');
}

function loadChat(id) {
  currentId = id;
  const c = JSON.parse(localStorage.getItem(storageKey)).find(x => x.id === id);
  $output.innerHTML = c.msgs.map(m => `
    <div class="user-msg">${m.q}</div>
    <div class="ai-msg">${m.a.replace(/\n/g,'<br>').replace(/\*\*(.*?)\*\*/g, '<b>$1</b>')}</div>
  `).join('');
  render();
  scrollToBottom();
}

function startNewChat() {
  currentId = null;
  $output.innerHTML = "";
  render();
}

function copyChat() {
  let t = "";
  document.querySelectorAll('#output > div').forEach(d =>
    t += (d.classList.contains('user-msg') ? "ME: " : "PATRÓN: ") + d.innerText + "\n\n"
  );
  navigator.clipboard.writeText(t);
  alert("Chat copied!");
}

function downloadChat() {
  let t = "";
  document.querySelectorAll('#output > div').forEach(d =>
    t += (d.classList.contains('user-msg') ? "ME: " : "PATRÓN: ") + d.innerText + "\n\n"
  );
  const blob = new Blob([t], { type: 'text/plain' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = "Tradicion_Chat_Export.txt";
  a.click();
}

function cycleTheme() {
  const themes = ['theme-hq', 'theme-tropical', 'theme-salsa'];
  const body = document.body;
  let idx = themes.findIndex(t => body.classList.contains(t));
  body.classList.remove(themes[idx]);
  body.classList.add(themes[(idx + 1) % themes.length]);
}

function toggleMode() {
  document.body.classList.toggle('dark-mode');
  document.getElementById('modeIcon').innerText =
    document.body.classList.contains('dark-mode') ? 'light_mode' : 'dark_mode';
}
</script>

</body>
</html>
